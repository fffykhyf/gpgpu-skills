lessons:
  - lesson_id: VORTEX_ISA_TRUTH_001
    source_project: Vortex
    applies_to: [gpgpu-arch, gpgpu-golden, gpgpu-runtime, gpgpu-rtl, gpgpu-simppa]
    topic: isa_source_of_truth
    principle: "ISA encoding, assembler, disassembler, RTL decode, simulator decode, intrinsics, startup assembly, and docs must derive from one SYSTEM_CONTRACT_IR source."
    do:
      - "Generate every opcode, funct field, variant bit, overloaded field, decode table, and docs row from the contract."
      - "Carry an isa_model_hash through each derived view."
    do_not:
      - "Treat docs, intrinsics, RTL decode, or simulator decode as independent ISA truth."
    evidence_anchor:
      - "ref/skillref/vortex-reader-reports/isa-instruction-flow.md"

  - lesson_id: VORTEX_WARP_STATE_002
    source_project: Vortex
    applies_to: [gpgpu-arch, gpgpu-golden, gpgpu-rtl, gpgpu-simppa]
    topic: warp_state_ownership
    principle: "PC, active mask, stalled state, CTA/workgroup fields, trap CSRs, and launch-visible state need explicit owners and update events."
    do:
      - "Model the warp as an SM-resident execution context with owned state, owner module, and transition events."
      - "Capture scheduled fetch snapshots instead of rereading live PC or live mask after cache latency."
    do_not:
      - "Conflate CTA slot ID with globally unique CTA identity."
    evidence_anchor:
      - "ref/skillref/vortex-reader-reports/simt-scheduler.md"

  - lesson_id: VORTEX_SCOREBOARD_003
    source_project: Vortex
    applies_to: [gpgpu-golden, gpgpu-rtl, gpgpu-simppa]
    topic: scoreboard_release
    principle: "Scoreboard release must be tied to final packet or final writeback, not raw FU response."
    do:
      - "Reserve on accepted issue and release only on final packet EOP after destination writeback is trace-visible."
    do_not:
      - "Wake a dependent instruction from an intermediate response fragment."
    evidence_anchor:
      - "ref/skillref/vortex-reader-reports/scoreboard-divergence.md"
      - "ref/skillref/vortex-reader-reports/register-file.md"

  - lesson_id: VORTEX_DIVERGENCE_004
    source_project: Vortex
    applies_to: [gpgpu-golden, gpgpu-rtl, gpgpu-simppa, gpgpu-atomic-sync]
    topic: split_join_semantics
    principle: "Divergence stack behavior, else-path activation, and reconvergence pop must be executable golden semantics."
    do:
      - "Represent SPLIT, JOIN, predicate mask writes, and reconvergence transitions as contract paths and traceable events."
    do_not:
      - "Hide divergence in scoreboard or scheduler readiness state."
    evidence_anchor:
      - "ref/skillref/vortex-reader-reports/scoreboard-divergence.md"

  - lesson_id: VORTEX_RF_TRACE_005
    source_project: Vortex
    applies_to: [gpgpu-rtl, gpgpu-simppa]
    topic: register_file_trace_identity
    principle: "Register writeback proof requires SM, warp, packet/lane, rd, mask, byte enable, data, and stable sequence id."
    do:
      - "Preserve writeback identity across operand collection, banked register file write, scoreboard release, and trace taps."
    do_not:
      - "Claim RF equivalence from rd/data alone."
    evidence_anchor:
      - "ref/skillref/vortex-reader-reports/register-file.md"

  - lesson_id: VORTEX_COALESCER_006
    source_project: Vortex
    applies_to: [gpgpu-runtime, gpgpu-rtl, gpgpu-memory, gpgpu-simppa]
    topic: memory_coalescer_restore
    principle: "Coalescer must preserve original request shape and restore lane-shaped response through tags, masks, byte enables, and offsets."
    do:
      - "Trace original request tag, lane mask, byte enable vector, per-lane offset, coalesced tag, and restored response shape."
    do_not:
      - "Use request-count reduction as the only coalescer correctness proof."
    evidence_anchor:
      - "ref/skillref/vortex-reader-reports/memory-coalescer-cache.md"

  - lesson_id: VORTEX_LAUNCH_007
    source_project: Vortex
    applies_to: [gpgpu-runtime, gpgpu-golden, gpgpu-rtl, gpgpu-simppa]
    topic: launch_abi_field_chain
    principle: "Every public launch ABI field must trace to queue command, control register, dispatch bus, CSR, or explicit unsupported behavior."
    do:
      - "Fail closed when an ABI field is exposed but not wired into device dispatch or marked unsupported."
    do_not:
      - "Expose priority, profile, cluster, or fault fields that silently do nothing."
    evidence_anchor:
      - "ref/skillref/vortex-reader-reports/runtime-launch.md"

  - lesson_id: VORTEX_SIMX_RTL_008
    source_project: Vortex
    applies_to: [gpgpu-golden, gpgpu-rtl, gpgpu-simppa]
    topic: simulator_rtl_twin
    principle: "Simulator-vs-RTL comparison is trusted only when both emit matching normalized trace fields."
    do:
      - "Compare toolchain, launch, decode, scheduler selection, masks, writeback, memory request/response, and scoreboard release in order."
    do_not:
      - "Trust UUID-only or final-memory-only comparisons for split packets, partial writes, or replay."
    evidence_anchor:
      - "ref/skillref/vortex-reader-reports/simx-rtl-consistency.md"

  - lesson_id: VORTEX_VERIFICATION_MATRIX_009
    source_project: Vortex
    applies_to: [gpgpu-arch, gpgpu-runtime, gpgpu-rtl, gpgpu-simppa]
    topic: verification_backend_matrix
    principle: "A design gate is a backend matrix, not one smoke command."
    do:
      - "Separate toolchain, runtime launch, module unit, RTL simulation, regression, synthesis, and FPGA smoke gates."
    do_not:
      - "Treat simulator-only smoke as sufficient for FPGA-facing changes."
    evidence_anchor:
      - "ref/skillref/vortex-reader-reports/verification-fpga-flow.md"

  - lesson_id: VORTEX_PPA_010
    source_project: Vortex
    applies_to: [gpgpu-simppa]
    topic: ppa_artifact_bundle
    principle: "Performance and power claims require counter, trace, SAIF, utilization, timing, and synthesis evidence bundles."
    do:
      - "Bind PPA claims to workload, counters, traces, SAIF/VCD provenance, utilization, timing, power, and backend logs."
    do_not:
      - "Accept power or FPGA claims from log-only evidence."
    evidence_anchor:
      - "ref/skillref/vortex-reader-reports/verification-fpga-flow.md"
