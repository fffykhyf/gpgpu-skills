  base_data_addr: {owner: gpgpu-golden, visibility: test_only, consumers: [runtime, validation]}
  base_a: {owner: gpgpu-golden, visibility: test_only, consumers: [runtime, validation]}
  base_b: {owner: gpgpu-golden, visibility: test_only, consumers: [runtime, validation]}
  base_c: {owner: gpgpu-golden, visibility: test_only, consumers: [runtime, validation]}
