version: v5
metric_groups:
  correctness_only_smoke:
    required_metrics: [total_cycles]
    graph_required: false
  standard_validation:
    required_metrics: [total_cycles, ipc, issue_utilization, stall_breakdown]
    graph_required: false
  performance_gate:
    required_metrics:
      - total_cycles
      - active_cycles
      - issue_cycles
      - commit_cycles
      - ipc
      - warp_eligible_rate
      - warp_issue_rate
      - issue_utilization
      - pipeline_utilization
      - stall_breakdown
      - memory_metrics
      - scheduler_metrics
      - backend_perf_evidence
    graph_required: true
warning_thresholds:
  LOW_ISSUE_UTILIZATION: issue_utilization_below_target
  HIGH_MEMORY_STALL: memory_wait_dominates_stall_breakdown
  HIGH_BANK_CONFLICT: shared_bank_conflict_rate_above_target
  HIGH_COALESCING_AMPLIFICATION: coalesced_transaction_count_above_target
  HIGH_CACHE_RESERVATION_FAIL: cache_reservation_fail_above_target
  HIGH_MSHR_FAIL: mshr_fail_above_target
  HIGH_ICNT_REQ_BACKPRESSURE: icnt_req_backpressure_above_target
  HIGH_ICNT_RETURN_BACKPRESSURE: icnt_return_backpressure_above_target
  HIGH_L2_QUEUE_FULL: l2_queue_full_above_target
  HIGH_DRAM_QUEUE_FULL: dram_queue_full_above_target
  HIGH_INTERFACE_BACKPRESSURE: interface_backpressure_above_target
  LOW_OCCUPANCY: ready_warp_count_avg_below_target
  COUNTER_WITHOUT_PRODUCER: stable_counter_missing_producer_path
  POWER_USED_AS_PRIMARY_EVIDENCE: power_evidence_without_activity_counter_support
  PPA_CLAIM_WITHOUT_SYNTHESIS_BUNDLE: missing_utilization_timing_or_power_report
  POWER_CLAIM_WITHOUT_SAIF: missing_switching_activity_evidence
  FPGA_CLAIM_WITHOUT_BACKEND_RUN: missing_fpga_or_hw_run_log
  PERF_COUNTER_UNBOUND_TO_CONTRACT: counter_missing_contract_path
