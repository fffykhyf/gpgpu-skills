table: architecture_preset_library
version: v5
selection_rules:
  - rule_id: CU_WAVEFRONT_L3_TARGET
    priority: 5
    match:
      abstraction_target: CU_WAVEFRONT_L3
    prefer_preset: MINIMAL_WAVEFRONT_CU
    rationale: L3 designs use CU plus wavefront contracts instead of legacy CU scheduler defaults.
  - rule_id: MULTI_CU_L4_TARGET
    priority: 6
    match:
      abstraction_target: CU_WAVEFRONT_L4
    prefer_preset: MULTI_CU_WAVEFRONT_GPGPU
    rationale: L4 designs need NoC, DRAM, coherence, atomic, and fence contracts across CUs.
  - rule_id: VALIDATION_TARGET_VERTICAL_SLICE
    priority: 10
    match:
      validation_target_contains:
        - compile_kernel_to_program_image
        - rtl_sim_smoke_test
        - memory_dump_golden_check
    prefer_preset: MINIMAL_VERTICAL_SLICE_GPGPU
    rationale: End-to-end frontend, program image, RTL smoke, and memory dump validation require a runnable vertical slice.
  - rule_id: TEACHING_ONLY_NO_RUNTIME_FRONTEND
    priority: 20
    match:
      user_target: teaching_only
      runtime_requirement: absent
      frontend_requirement: absent
      vertical_slice_requirement: absent
    prefer_preset: MINIMAL_WAVEFRONT_CU_TEACHING
    rationale: Teaching-only explanations should minimize architecture surface area when no runtime or frontend path is required.
  - rule_id: MEMORY_LATENCY_HIDING_OR_MULTI_WAVEFRONT
    priority: 30
    match_any:
      - workload_needs_memory_latency_hiding: true
      - wavefront_slots_per_cu_gt: 1
    prefer_preset: MULTI_WAVEFRONT_SINGLE_CU
    unless_rule_matched: VALIDATION_TARGET_VERTICAL_SLICE
    rationale: Memory latency hiding and more than one resident wavefront require multi-wavefront scheduling and scoreboard behavior.
presets:
  - preset_id: MINIMAL_WAVEFRONT_CU
    description: Single CU wavefront design with explicit wavepool, EXEC mask lifecycle, LDS, LSU front-end, and CU issue model.
    parameters:
      cu_count: 1
      wavefront_size: 32
      wavefront_slots_per_cu: 4
      wavefront_scheduler_policy: SCOREBOARD_ROUND_ROBIN
      issue_width: 1
      cu_hierarchy: [wavepool, exec_context_table, simd_lanes, lds, lsu_frontend, issue_arbiter]
      register_file:
        sgpr_count: 512
        vgpr_count: 1024
        integer_width_bits: 32
      lds:
        bytes_per_cu: 4096
        banks: 4
      memory_hierarchy:
        coalescer: RULE_BASED
        global_interface_bits: 64
      isa_profile: WAVEFRONT_SIMT_BASE
      launch_abi: SIMPLE_MMIO_DOORBELL_V1
    provenance: DESIGN_PRESET
  - preset_id: MULTI_CU_WAVEFRONT_GPGPU
    description: Multi-CU wavefront GPGPU with CU_ID routing, NoC/L2/DRAM path, coherence hooks, atomics, and fence semantics.
    parameters:
      cu_count: 4
      wavefront_size: 32
      wavefront_slots_per_cu: 8
      wavefront_scheduler_policy: SCOREBOARD_ROUND_ROBIN
      issue_width: 1
      memory_hierarchy:
        l1_per_cu: true
        l2_slices: 2
        dram_channels: 1
        noc_routing: EXPLICIT_CU_TO_L2
        coherence: L2_VISIBLE_WRITEBACK
      synchronization:
        atomics: L2_SERIALIZED
        fences: DEVICE_SCOPE
        barriers: [wavefront, CU, grid_optional]
      isa_profile: WAVEFRONT_SIMT_L4
      launch_abi: SIMPLE_MMIO_DOORBELL_V1
    provenance: DESIGN_PRESET
  - preset_id: MINIMAL_WAVEFRONT_CU_TEACHING
    description: Single CU, single resident wavefront, teaching-friendly integer SIMT core.
    parameters:
      cu_count: 1
      wavefront_size: 8
      wavefront_slots_per_cu: 1
      scheduler_policy: ROUND_ROBIN
      issue_width: 1
      register_file:
        registers_per_thread: 16
        integer_width_bits: 32
      shared_memory:
        bytes_per_cu: 0
        banks: 0
      memory_hierarchy:
        cache_policy: NONE
        global_interface_bits: 32
      isa_profile: RV32I_SIMT_MINIMAL
      launch_abi: SIMPLE_MMIO_DOORBELL_V1
    provenance: DESIGN_PRESET
  - preset_id: MULTI_WAVEFRONT_SINGLE_CU
    description: Single CU with multiple resident wavefronts, scoreboard wakeup, and optional direct-mapped L1.
    parameters:
      cu_count: 1
      wavefront_size: 8
      wavefront_slots_per_cu: 4
      scheduler_policy: SCOREBOARD_ROUND_ROBIN
      issue_width: 1
      register_file:
        registers_per_thread: 32
        integer_width_bits: 32
      shared_memory:
        bytes_per_cu: 4096
        banks: 4
      memory_hierarchy:
        cache_policy: DIRECT_MAPPED_L1
        global_interface_bits: 64
      isa_profile: RV32I_SIMT_BASE
      launch_abi: SIMPLE_MMIO_DOORBELL_V1
    provenance: DESIGN_PRESET
  - preset_id: MINIMAL_VERTICAL_SLICE_GPGPU
    description: Small end-to-end SIMT GPU prototype with CUDA-like frontend, assembler, program image, RTL simulation, and golden memory dump check.
    parameters:
      cu_count: 4
      allowed_cu_count: [1, 4]
      wavefront_size: 8
      wavefront_slots_per_cu: 4
      scheduler_policy: ROUND_ROBIN
      issue_width: 1
      pipeline: IF_ID_EX_MEM_WB
      register_file:
        registers_per_thread: 32
        integer_width_bits: 32
      divergence: SIMT_STACK_JOIN
      memory_hierarchy:
        cache_policy: DIRECT_MAPPED_L1
        global_interface_bits: 64
        load_store_path: LDW_STW_GLOBAL_ONLY_FIRST
      frontend: PYTHON_CUDA_LIKE_SUBSET
      assembler: REQUIRED
      verilator_smoke: REQUIRED
      memory_dump_golden_check: REQUIRED
      isa_profile: VERTICAL_SLICE_SIMT_BASE
      launch_abi: SIMPLE_MMIO_DOORBELL_V1
    non_goals: [coherent_cache, full_cuda, virtual_memory, atomics_initially, tensor_core, dram_controller_accuracy]
    provenance: DESIGN_PRESET
unsupported_presets: [FPGA_SMALL_GPGPU, TENSOR_EXTENDED_GPGPU]
