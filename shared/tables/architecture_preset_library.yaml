table: architecture_preset_library
version: v5
selection_rules:
  - rule_id: PROFILE_MINIMAL_SIMT_CORE
    priority: 5
    match:
      capability_profile: minimal_simt_core
    prefer_preset: MINIMAL_SIMT_CORE
    rationale: The smallest profile keeps one SM and one warp with a simple global memory path.
  - rule_id: PROFILE_SINGLE_SM_WARP_PIPELINE
    priority: 10
    match:
      capability_profile: single_sm_warp_pipeline
    prefer_preset: SINGLE_SM_WARP_PIPELINE
    rationale: Single-SM pipeline work requires resident multi-warp scheduling, scoreboard, divergence, and LSU hooks.
  - rule_id: PROFILE_TOOLCHAIN_RUNTIME_VERTICAL_SLICE
    priority: 15
    match:
      capability_profile: toolchain_runtime_vertical_slice
    prefer_preset: TOOLCHAIN_RUNTIME_VERTICAL_SLICE
    rationale: End-to-end credibility requires assembler, disassembler, program image, loader, runtime launch, RTL smoke, and golden dump evidence.
  - rule_id: PROFILE_MULTI_SM_MEMORY_PATH
    priority: 20
    match:
      capability_profile: multi_sm_memory_path
    prefer_preset: MULTI_SM_MEMORY_PATH
    rationale: Multi-SM memory work requires SM_ID routing, shared memory/LDS, coalescer, response restore, and L1 cache or global adapter policy.
  - rule_id: PROFILE_FULL_MEMORY_SYNC_SYSTEM
    priority: 25
    match:
      capability_profile: full_memory_sync_system
    prefer_preset: FULL_MEMORY_SYNC_SYSTEM
    rationale: Full memory and synchronization work requires fabric, L2 cache slice, MSHR, DRAM, atomic, fence, barrier, and memory visibility contracts.
  - rule_id: VALIDATION_TARGET_VERTICAL_SLICE
    priority: 30
    match:
      validation_target_contains:
        - compile_kernel_to_program_image
        - rtl_sim_smoke_test
        - memory_dump_golden_check
    prefer_preset: TOOLCHAIN_RUNTIME_VERTICAL_SLICE
    rationale: Toolchain, runtime, RTL smoke, and memory dump validation require a runnable vertical slice.
  - rule_id: TEACHING_ONLY_NO_RUNTIME_FRONTEND
    priority: 40
    match:
      user_target: teaching_only
      runtime_requirement: absent
      frontend_requirement: absent
      vertical_slice_requirement: absent
    prefer_preset: MINIMAL_SIMT_CORE
    rationale: Teaching-only explanations should minimize architecture surface area when no runtime or frontend path is required.
presets:
  - preset_id: MINIMAL_SIMT_CORE
    capability_profile: minimal_simt_core
    description: Minimal SIMT core with one SM and one resident warp for basic warp instruction execution.
    parameters:
      sm_count: 1
      warp_count: 1
      warp_size: 8
      memory_path: simple_global_memory
      runtime_required: false
      enabled_subsystems:
        - simt_core
        - warp_scheduler
        - simple_global_memory
      isa_profile: RV32I_SIMT_MINIMAL
      launch_abi: none_or_testbench
    provenance: DESIGN_PRESET
  - preset_id: SINGLE_SM_WARP_PIPELINE
    capability_profile: single_sm_warp_pipeline
    description: Single SM with multiple resident warps, scoreboard, divergence, and LSU base path.
    parameters:
      sm_count: 1
      warp_count: multiple
      warp_size: 32
      warp_slots_per_sm: 4
      scoreboard: required
      divergence: required
      lsu: required
      enabled_subsystems:
        - simt_core
        - warp_scheduler
        - scoreboard
        - divergence_unit
        - lsu
      memory_hierarchy:
        mode: direct_global_adapter
        l1_cache_optional: true
      isa_profile: WARP_SIMT_BASE
      launch_abi: SIMPLE_MMIO_DOORBELL_V1
    provenance: DESIGN_PRESET
  - preset_id: TOOLCHAIN_RUNTIME_VERTICAL_SLICE
    capability_profile: toolchain_runtime_vertical_slice
    description: End-to-end prototype with assembler, disassembler, program image, loader, runtime launch, RTL smoke, and golden dump evidence.
    parameters:
      assembler: required
      disassembler: required
      program_image: required
      loader: required
      runtime_launch: required
      rtl_smoke: required
      golden_dump: required
      sm_count: 1
      warp_size: 8
      warp_slots_per_sm: 2
      enabled_subsystems:
        - simt_core
        - assembler
        - disassembler
        - program_image
        - loader
        - runtime_launch
        - rtl_smoke
        - golden_dump
      isa_profile: VERTICAL_SLICE_SIMT_BASE
      launch_abi: SIMPLE_MMIO_DOORBELL_V1
    non_goals: [coherent_cache, full_cuda, virtual_memory, tensor_core, dram_timing_accuracy]
    provenance: DESIGN_PRESET
  - preset_id: MULTI_SM_MEMORY_PATH
    capability_profile: multi_sm_memory_path
    description: Multi-SM memory path with shared memory/LDS, coalescer, L1 cache or global adapter, response restore, and SM_ID routing.
    parameters:
      sm_count: multiple
      default_sm_count: 4
      warp_size: 32
      warp_slots_per_sm: 8
      shared_memory: required
      coalescer: required
      l1_cache_or_global_adapter: required
      response_restore: required
      sm_id_routing: required
      enabled_subsystems:
        - simt_core
        - warp_scheduler
        - scoreboard
        - divergence_unit
        - lsu
        - shared_memory
        - coalescer
        - l1_cache_or_global_adapter
        - response_restore
        - sm_id_routing
      memory_hierarchy:
        l1_cache_or_global_adapter: direct_global_adapter
        l2_slices: optional
      isa_profile: WARP_SIMT_MEMORY_PATH
      launch_abi: SIMPLE_MMIO_DOORBELL_V1
    provenance: DESIGN_PRESET
  - preset_id: FULL_MEMORY_SYNC_SYSTEM
    capability_profile: full_memory_sync_system
    description: Full memory and synchronization system with fabric, L2 cache slice, MSHR, DRAM, atomic, fence, barrier, and visibility model.
    parameters:
      sm_count: multiple
      default_sm_count: 4
      warp_size: 32
      warp_slots_per_sm: 8
      fabric: required
      l2_cache_slice: required
      mshr: required
      dram_controller: required
      atomic_unit: required
      fence_unit: required
      barrier_unit: required
      memory_visibility_model: required
      enabled_subsystems:
        - simt_core
        - warp_scheduler
        - scoreboard
        - divergence_unit
        - lsu
        - shared_memory
        - coalescer
        - l1_cache_or_global_adapter
        - interconnect_fabric
        - l2_cache_slice
        - dram_controller
        - atomic_unit
        - fence_unit
        - barrier_unit
        - memory_visibility_model
      memory_hierarchy:
        l1_cache_or_global_adapter: private_l1_cache_or_direct_global_adapter
        l2_cache_slice: required
        mshr: required
        dram_channels: 1
      synchronization:
        atomic_unit: required
        fence_unit: required
        barrier_unit: required
        wsync_drain_unit: required
      isa_profile: WARP_SIMT_FULL_MEMORY_SYNC
      launch_abi: SIMPLE_MMIO_DOORBELL_V1
    provenance: DESIGN_PRESET
unsupported_presets: [FPGA_SMALL_GPGPU, TENSOR_EXTENDED_GPGPU]
