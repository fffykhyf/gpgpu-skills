    examples: [assembler_encoding_fix, disassembler_roundtrip_fix, instruction_encoding_fix, program_image_layout_fix, loader_contract_binding_fix]
  RUNTIME_PATCH:
    target_owner: gpgpu-runtime
    examples: [runtime_arg_buffer_fix, kernel_launch_sequence_fix, csr_launch_sequence_fix, completion_fault_observation_fix]
  RUNTIME_ABI_PATCH:
    target_owner: gpgpu-runtime
    examples: [launch_descriptor_contract_fix, argument_layout_contract_fix, compatibility_profile_mapping_fix]
  RTL_PATCH:
    target_owner: gpgpu-rtl
    examples: [pipeline_relayout, scoreboard_redesign, lsq_replay_policy_change, interface_latency_adjustment]
