table: output_mode_table
version: v1
default_output_mode: FAST_ITERATION
modes:
  FAST_ITERATION:
    purpose: Rapid design exploration and early implementation feedback.
    max_human_visible_reports: 5
    full_ir_expansion: false
    debug_expansion: false
    human_visible:
      - DESIGN_BRIEF.zh.md
      - ARCHITECTURE_DECISION.zh.md
      - IMPLEMENTATION_DASHBOARD.zh.md
      - VALIDATION_DASHBOARD.zh.md
    failure_human_visible:
      - PATCH_CARD.zh.md
    ai_required:
      - DESIGN_INTENT_IR
      - ARCH_IR
      - MICRO_CONSTRAINT_ESTIMATE_IR
      - SYSTEM_CONTRACT_IR.compact
      - INCREMENTAL_RTL_MAP
      - PASS_EVIDENCE_REPORT
      - PERFORMANCE_METRIC_IR
      - REGRESSION_FINGERPRINT
  CONTRACT_FREEZE:
    purpose: Human review before freezing ISA, ABI, memory model, launch ABI, and interface semantics.
    max_human_visible_reports: 4
    full_ir_expansion: true
    debug_expansion: false
    human_visible:
      - CONTRACT_FREEZE_SUMMARY.zh.md
      - ARCHITECTURE_DECISION.zh.md
      - VALIDATION_DASHBOARD.zh.md
    ai_required:
      - DESIGN_INTENT_IR
      - ARCH_IR
      - MICRO_CONSTRAINT_ESTIMATE_IR
      - SYSTEM_CONTRACT_IR
      - GOLDEN_CONTRACT_MODEL
      - CONTRACT_SEMANTICS_REPORT
      - TOOLCHAIN_ARTIFACT_IR
  DEBUG_REGRESSION:
    purpose: Failure, ambiguous root cause, recurring regression, or insufficient trace evidence investigation.
    max_human_visible_reports: 4
    full_ir_expansion: false
    debug_expansion: true
    human_visible:
      - DEBUG_SUMMARY.zh.md
      - PATCH_CARD.zh.md
      - REGRESSION_SUMMARY.zh.md
    ai_required:
      - NORMALIZED_TRACE_IR
      - CORRECTNESS_GATE_REPORT
      - FIRST_DIVERGENCE_REPORT
      - TRACE_COVERAGE_REPORT
      - PERF_ATTRIBUTION_GRAPH
      - ROOT_CAUSE_REPORT
      - ARCH_REWRITE_PLAN
      - REWRITE_DECISION_REPORT
      - REGRESSION_TRACKING_REPORT
