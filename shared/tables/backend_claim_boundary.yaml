table: backend_claim_boundary
version: v1
backend_claims:
  yosys_lint_parse:
    supports: [parses_on_yosys, frontend_compatible_with_limits]
    rejects: [elaborates_on_yosys, synthesizes_on_yosys, ppa_baseline, timing_closure, frequency_mhz, backend_signoff, frequency_closure]
  yosys_elaborate:
    supports: [elaborates_on_yosys, hierarchy_resolves_on_yosys]
    rejects: [synthesizes_on_yosys, ppa_baseline, timing_closure, frequency_mhz, backend_signoff, frequency_closure]
  yosys_synth_generic:
    supports: [synthesizes_on_yosys, generic_cell_count, hierarchy_size, synthesis_hygiene]
    rejects: [timing_closure, frequency_mhz, backend_signoff, frequency_closure]
  yosys_ppa_baseline:
    supports: [cell_count, wire_bits, hierarchy_size, relative_area_trend, synthesis_hygiene]
    rejects: [timing_closure, frequency_mhz, backend_signoff, frequency_closure]
  yosys_elaborate_only:
    supports: [syntax_parse, hierarchy_elaborated]
    rejects: [fmax, timing_closure, frequency_mhz, backend_signoff, bounded_no_protocol_violation, unbounded_proof, full_correctness_proof]
  yosys_synth_hygiene:
    supports: [cell_count, wire_bits, hierarchy_size, synthesis_hygiene]
    rejects: [fmax, timing_closure, frequency_mhz, backend_signoff, unbounded_proof, full_correctness_proof]
  sby_bmc_interface_protocol:
    supports: [bounded_no_protocol_violation, counterexample_found]
    rejects: [unbounded_proof, full_correctness_proof, timing_closure, frequency_mhz]
  smtbmc_assertion_pack:
    supports: [bounded_assertion_pass, counterexample_found]
    rejects: [unbounded_proof, full_correctness_proof, timing_closure, frequency_mhz]
formal_claims:
  bounded_model_check:
    allowed:
      - bounded_no_protocol_violation
      - counterexample_found
    forbidden:
      - unbounded_proof
      - full_correctness_proof
  simulation_assertion:
    allowed:
      - assertion_exercised_in_test
      - assertion_failed_with_trace
    forbidden:
      - proof
      - exhaustive_coverage
failure_modes:
  missing_evidence: BACKEND_EVIDENCE_MISSING
  unsupported_claim: BACKEND_UNSUPPORTED_CLAIM
  claim_boundary_absent: BACKEND_CLAIM_BOUNDARY_MISSING
