version: v5
failure_points:
  ASM_PARSE:
    root_cause_class: TOOLCHAIN_ROOT_CAUSE
    root_cause_subclass: ASM_PARSE_FAIL
  ASM_ENCODE:
    root_cause_class: TOOLCHAIN_ROOT_CAUSE
    root_cause_subclass: ASM_ENCODE_MISMATCH
  DISASM_DECODE:
    root_cause_class: TOOLCHAIN_ROOT_CAUSE
    root_cause_subclass: DISASM_ROUNDTRIP_MISMATCH
  ROUNDTRIP:
    root_cause_class: TOOLCHAIN_ROOT_CAUSE
    root_cause_subclass: DISASM_ROUNDTRIP_MISMATCH
  PROGRAM_IMAGE_LAYOUT:
    root_cause_class: TOOLCHAIN_ROOT_CAUSE
    root_cause_subclass: PROGRAM_IMAGE_LAYOUT_MISMATCH
  ENTRY_SYMBOL_RESOLUTION:
    root_cause_class: TOOLCHAIN_ROOT_CAUSE
    root_cause_subclass: ENTRY_SYMBOL_RESOLVE_MISMATCH
  LOADER_INIT:
    root_cause_class: TOOLCHAIN_ROOT_CAUSE
    root_cause_subclass: LOADER_CONTRACT_MISMATCH
  RUNTIME_ARG_ENCODING:
    root_cause_class: RUNTIME_LAUNCH_ROOT_CAUSE
    root_cause_subclass: ARG_BUFFER_ENCODING_MISMATCH
  RTL_FETCH:
    root_cause_class: RTL_FUNCTIONAL_ROOT_CAUSE
    root_cause_subclass: PC_UPDATE_MISMATCH
  RTL_DECODE:
    root_cause_class: RTL_FUNCTIONAL_ROOT_CAUSE
    root_cause_subclass: DECODE_MISMATCH
checked_chain_fields:
  - assembly_ir_hash
  - assembler_output_hash
  - disassembly_hash
  - program_image_hash
  - loader_contract_hash
  - runtime_launch_hash
  - rtl_first_fetch_hash
