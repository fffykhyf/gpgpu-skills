version: v5
root_causes:
  CONTRACT_ROOT_CAUSE:
    subclasses:
      - CONTRACT_STATE_RULE_MISMATCH
      - CONTRACT_MEMORY_RULE_MISMATCH
      - CONTRACT_LAUNCH_RULE_MISMATCH
    requires: [contract_paths, evidence_hashes]
    rewrite_candidate: CONTRACT_PATCH
  GOLDEN_MODEL_ROOT_CAUSE:
    subclasses:
      - GOLDEN_EXECUTION_MISMATCH
      - GOLDEN_DECODE_MISMATCH
      - GOLDEN_COVERAGE_GAP
    requires: [golden_model_hash, contract_paths]
    rewrite_candidate: GOLDEN_MODEL_PATCH
  TOOLCHAIN_ROOT_CAUSE:
    subclasses:
      - ASM_PARSE_FAIL
      - ASM_ENCODE_MISMATCH
      - DISASM_ROUNDTRIP_MISMATCH
      - PROGRAM_IMAGE_LAYOUT_MISMATCH
      - ENTRY_SYMBOL_RESOLVE_MISMATCH
      - LOADER_CONTRACT_MISMATCH
    requires: [toolchain_artifact_paths, contract_paths, evidence_hashes]
    rewrite_candidate: TOOLCHAIN_PATCH
  RUNTIME_LAUNCH_ROOT_CAUSE:
    subclasses:
      - ARG_BUFFER_ENCODING_MISMATCH
      - GRID_DIM_MISMATCH
      - BLOCK_DIM_MISMATCH
      - KERNEL_ENTRY_MISMATCH
      - CSR_START_SEQUENCE_MISMATCH
      - COMPLETION_OBSERVATION_MISMATCH
    requires: [toolchain_artifact_paths, contract_paths, evidence_hashes]
    rewrite_candidate: RUNTIME_PATCH
  RTL_FUNCTIONAL_ROOT_CAUSE:
    subclasses:
      - PC_UPDATE_MISMATCH
      - DECODE_MISMATCH
      - ACTIVE_MASK_MISMATCH
      - PREDICATE_MASK_MISMATCH
      - REGISTER_WRITEBACK_MISMATCH
      - BRANCH_DIVERGENCE_MISMATCH
      - BARRIER_STATE_MISMATCH
    requires: [rtl_module_paths, contract_paths, evidence_hashes]
    rewrite_candidate: RTL_PATCH
  RTL_INTERFACE_ROOT_CAUSE:
    subclasses:
      - VALID_READY_PROTOCOL_MISMATCH
      - PAYLOAD_STABILITY_VIOLATION
      - RESPONSE_TAG_MISMATCH
      - REQUEST_RESPONSE_ORDER_MISMATCH
      - BACKPRESSURE_DEADLOCK
    requires: [rtl_module_paths, contract_paths, evidence_hashes]
    rewrite_candidate: RTL_PATCH
  MEMORY_SYSTEM_ROOT_CAUSE:
    subclasses:
      - COALESCING_MISMATCH
      - COALESCER_RESPONSE_SHAPE_MISMATCH
      - COALESCER_TAG_RESTORE_MISMATCH
      - CACHE_REPLAY_ORDER_MISMATCH
      - MSHR_DEADLOCK_GUARD_MISSING
      - SCOREBOARD_WAKEUP_BEFORE_FINAL_RESPONSE
      - BYTE_ENABLE_MISMATCH
      - LANE_MASK_MISMATCH
      - LSQ_ORDERING_MISMATCH
      - DUPLICATE_REQUEST
      - RESPONSE_ROUTING_MISMATCH
      - BANK_CONFLICT_OVERHEAD
      - MEMORY_REPLAY_OVERHEAD
    requires: [memory_request, request_tag, response_tag, contract_paths, rtl_module_paths]
    rewrite_candidate: RTL_PATCH
  MEMORY_PATH_ROOT_CAUSE:
    subclasses:
      - LSU_LANE_FORMAT_MISMATCH
      - MEMORY_TAG_REUSE_BEFORE_EOP
      - COALESCER_RESPONSE_SHAPE_MISMATCH
      - BYTE_ENABLE_RESTORE_MISMATCH
    requires: [lsu_lane_request, memory_tag, coalescer_restore, contract_paths, rtl_module_paths]
    rewrite_candidate: MEMORY_PATH_PATCH
  FABRIC_ROOT_CAUSE:
    subclasses:
      - L2_SLICE_ROUTE_MISMATCH
      - RESPONSE_DEMUX_MISMATCH
      - FABRIC_QUEUE_BACKPRESSURE_MISSING
    requires: [fabric_request, fabric_response, route_id, queue_occupancy, contract_paths, rtl_module_paths]
    rewrite_candidate: FABRIC_PATCH
  CACHE_MSHR_ROOT_CAUSE:
    subclasses:
      - MSHR_REPLAY_MISMATCH
      - CACHE_RESPONSE_ROUTING_MISMATCH
      - MSHR_DEADLOCK_GUARD_MISSING
    requires: [l2_cache_slice, mshr_id, replay_event, response_demux_target, contract_paths, rtl_module_paths]
    rewrite_candidate: MEMORY_PATH_PATCH
  DRAM_ROOT_CAUSE:
    subclasses:
      - DRAM_ORDERING_MISMATCH
      - DRAM_BANK_CONFLICT_MODEL_MISMATCH
      - DRAM_RESPONSE_ORDER_MISMATCH
    requires: [dram_schedule, dram_bank_id, ordering_scope, response_tag, contract_paths, rtl_module_paths]
    rewrite_candidate: MEMORY_PATH_PATCH
  SYNC_ATOMIC_ROOT_CAUSE:
    subclasses:
      - ATOMIC_SERIALIZATION_MISMATCH
      - FENCE_DRAIN_INCOMPLETE
      - BARRIER_PHASE_MISMATCH
      - WSYNC_DRAIN_MISMATCH
    requires: [serialization_point, visibility_event, barrier_phase, wsync_drain, contract_paths, rtl_module_paths]
    rewrite_candidate: SYNC_ATOMIC_PATCH
  SCHEDULER_ROOT_CAUSE:
    subclasses:
      - LOW_ELIGIBLE_WARP_RATE
      - SCOREBOARD_WAKEUP_DELAY
      - UNFAIR_WARP_SELECTION
      - READY_WARP_NOT_ISSUED
      - EXCESSIVE_BARRIER_WAIT
    requires: [warp, scheduler_state, contract_paths, rtl_module_paths]
    rewrite_candidate: RTL_PATCH
  PERFORMANCE_ARCH_ROOT_CAUSE:
    subclasses:
      - LOW_OCCUPANCY
      - PIPELINE_IMBALANCE
      - REGISTER_FILE_PORT_PRESSURE
      - MEMORY_BANDWIDTH_SATURATION
      - ISSUE_WIDTH_UNDERUTILIZATION
      - EXCESSIVE_DIVERGENCE_OVERHEAD
    requires: [performance_metric_ref, perf_attribution_graph_ref, contract_paths, rtl_module_paths, bottleneck_cycle_window, counter_evidence, alternative_patch_rejection]
    rewrite_candidate: ARCHITECTURE_PATCH
  COUNTER_SCHEMA_ROOT_CAUSE:
    subclasses:
      - COUNTER_PRODUCER_MISSING
      - PARSER_ONLY_COUNTER_USED_AS_STABLE
      - DEFINED_ONLY_COUNTER_USED_AS_STABLE
      - COUNTER_SAMPLE_WINDOW_AMBIGUOUS
    requires: [counter_manifest_ref, producer_audit_ref, affected_counters]
    rewrite_candidate: COUNTER_SCHEMA_PATCH
  CONFIG_DRIFT_ROOT_CAUSE:
    subclasses:
      - SIMULATOR_PRIVATE_PARAMETER_IN_HARDWARE_CONTRACT
      - CUDA_PTX_FIELD_IN_NATIVE_ABI
      - FIXED_LATENCY_COPIED_AS_RTL_TRUTH
      - TESTED_CONFIG_QUEUE_DEPTH_COPIED_AS_DEFAULT
    requires: [config_classification_ref, contract_paths, rejected_parameter]
    rewrite_candidate: SIMULATOR_ARTIFACT_REMOVAL_PATCH
  ATTRIBUTION_VALIDITY_ROOT_CAUSE:
    subclasses:
      - ROOT_CAUSE_MISSING_SYMPTOM_COUNTER
      - ROOT_CAUSE_MISSING_EXCLUSION_COUNTER
      - ROOT_CAUSE_MISSING_QUEUE_OWNER
      - POWER_USED_AS_PRIMARY_EVIDENCE
    requires: [perf_attribution_graph_ref, missing_evidence]
    rewrite_candidate: TEST_EVIDENCE_PATCH
  SIMULATOR_ARTIFACT_ROOT_CAUSE:
    subclasses:
      - CPP_QUEUE_COPIED_TO_RTL
      - BOOKSIM_CONFIG_COPIED_TO_FABRIC_TRUTH
      - ACCELWATTCH_OBJECT_COPIED_TO_RTL
      - CUDA_STREAM_STACK_COPIED_TO_ABI
      - PTX_OPCODE_LATENCY_COPIED_TO_PIPELINE
    requires: [artifact_path, provenance_path, removal_target]
    rewrite_candidate: SIMULATOR_ARTIFACT_REMOVAL_PATCH
  TEST_EVIDENCE_ROOT_CAUSE:
    subclasses:
      - MISSING_GOLDEN_TRACE
      - MISSING_RTL_TRACE
      - HASH_MISMATCH
      - INSUFFICIENT_COVERAGE
      - AMBIGUOUS_TRACE_ORDERING
    requires: [missing_evidence]
    rewrite_candidate: TEST_EVIDENCE_PATCH
  INSUFFICIENT_TRACE_EVIDENCE:
    subclasses:
      - INSUFFICIENT_TRACE_DETAIL
    requires: [missing_evidence]
    rewrite_candidate: TEST_EVIDENCE_PATCH
  ROOT_CAUSE_AMBIGUOUS:
    subclasses:
      - MULTIPLE_UNRANKED_CAUSES
    requires: [ambiguous_evidence]
    rewrite_candidate: TEST_EVIDENCE_PATCH
