table: root_cause_taxonomy
version: v1
root_causes:
  YOSYS_RTL_STYLE_ROOT_CAUSE:
    subclasses:
      - TOP_LEVEL_UNPACKED_ARRAY_PORT
      - MEMORY_RESET_PROFILE_GATE_MISSING
      - DATA_DEPENDENT_WHILE_LOOP
      - NON_CONSTANT_LOOP_BOUND_IN_SYNTH_REGION
      - VALID_READY_PROTOCOL_SYNTH_UNSAFE
      - DONE_RESULT_STABILITY_UNSAFE
    requires: [YOSYS_RTL_COMPATIBILITY_REPORT, RTL_SYNTH_HYGIENE_REPORT]
    rewrite_candidate: YOSYS_RTL_STYLE_PATCH
  YOSYS_FLOW_ROOT_CAUSE:
    subclasses:
      - BUILD_DIR_REPORT_PATH_MISMATCH
      - YOSYS_SCRIPT_MISSING
      - FILELIST_HASH_MISMATCH
      - SCRIPT_HASH_MISMATCH
      - PROFILE_RESULT_MISSING
    requires: [YOSYS_FLOW_IR, YOSYS_EVIDENCE_BUNDLE]
    rewrite_candidate: YOSYS_FLOW_PATCH
  BACKEND_CLAIM_ROOT_CAUSE:
    subclasses:
      - PPA_CLAIM_WITHOUT_STAT_REPORT
      - TIMING_CLAIM_FROM_YOSYS_PPA_ONLY
      - FREQUENCY_CLAIM_FROM_YOSYS_PPA_ONLY
      - BACKEND_SIGNOFF_CLAIM_FROM_YOSYS_PPA_ONLY
    requires: [YOSYS_EVIDENCE_BUNDLE, backend_claim_boundary]
    rewrite_candidate: BACKEND_CLAIM_PATCH
  REPORT_PATH_ROOT_CAUSE:
    subclasses:
      - BUILD_DIR_MISSING
      - REPORT_DIR_MISSING
      - LOG_DIR_MISSING
      - REPORT_OUTSIDE_DECLARED_DIR
    requires: [YOSYS_FLOW_IR, YOSYS_EVIDENCE_BUNDLE]
    rewrite_candidate: REPORT_PATH_PATCH
