table: human_report_template_table
version: v1
templates:
  DESIGN_BRIEF:
    path: shared/templates/human/zh/design_brief.zh.md
    required_sections: [目标, 非目标, 硬约束, 本轮输出, 当前风险, 下一步]
    source_ai_artifacts: [DESIGN_INTENT_IR, ARCH_IR, MICRO_CONSTRAINT_ESTIMATE_IR]
  ARCHITECTURE_DECISION:
    path: shared/templates/human/zh/architecture_decision.zh.md
    required_sections: [本轮选择, 选择理由, 被拒绝的方案, 影响范围, 需要确认的问题]
    source_ai_artifacts: [ARCH_IR, MICRO_CONSTRAINT_ESTIMATE_IR]
  CONTRACT_FREEZE_SUMMARY:
    path: shared/templates/human/zh/contract_freeze_summary.zh.md
    required_sections: [本次冻结的内容, 派生关系, 禁止独立定义的内容, 冻结前检查, 冻结后影响]
    source_ai_artifacts: [SYSTEM_CONTRACT_IR, GOLDEN_CONTRACT_MODEL, CONTRACT_SEMANTICS_REPORT]
  IMPLEMENTATION_DASHBOARD:
    path: shared/templates/human/zh/implementation_dashboard.zh.md
    required_sections: [总体状态, 模块绑定状态, 接口风险, 局部仿真, 当前阻塞, 下一步]
    source_ai_artifacts: [INCREMENTAL_RTL_MAP, MODULE_INTERFACE_REPORT, RTL_PARTIAL_SIM_REPORT]
  VALIDATION_DASHBOARD:
    path: shared/templates/human/zh/validation_dashboard.zh.md
    required_sections: [总体状态, 通过证据, 覆盖情况, 性能摘要, 当前阻塞]
    source_ai_artifacts: [CORRECTNESS_GATE_REPORT, PASS_EVIDENCE_REPORT, PERFORMANCE_METRIC_IR]
  DEBUG_SUMMARY:
    path: shared/templates/human/zh/debug_summary.zh.md
    required_sections: [问题摘要, 首次分歧, 证据摘要, 当前判断, 下一步]
    source_ai_artifacts: [FIRST_DIVERGENCE_REPORT, ROOT_CAUSE_REPORT, PERF_ATTRIBUTION_GRAPH]
  PATCH_CARD:
    path: shared/templates/human/zh/patch_card.zh.md
    required_sections: [问题摘要, 证据, 判断, 修复计划, 重新验证, 回归风险]
    source_ai_artifacts: [ROOT_CAUSE_REPORT, ARCH_REWRITE_PLAN, REWRITE_DECISION_REPORT]
  REGRESSION_SUMMARY:
    path: shared/templates/human/zh/regression_summary.zh.md
    required_sections: [回归状态, 历史指纹, 重复失败, 回滚判断, 下一步]
    source_ai_artifacts: [REGRESSION_FINGERPRINT, REGRESSION_TRACKING_REPORT]
