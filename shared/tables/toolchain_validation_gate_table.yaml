table: toolchain_validation_gate_table
version: v5
gates:
  isa_table_derivation_smoke:
    input: SYSTEM_CONTRACT_IR
    output: TOOLCHAIN_ARTIFACT_IR
    fail: ISA_TABLE_DERIVATION_FAIL
  assembler_parse_smoke:
    input: input_kernel.asm
    output: ASSEMBLY_IR
    fail: ASM_PARSE_FAIL
  assembler_smoke:
    input: ASSEMBLY_IR
    output: encoded_bytes
    fail: ASM_ENCODE_FAIL
  disassembler_decode_smoke:
    input: encoded_bytes
    output: DISASSEMBLY_IR
    fail: DISASM_DECODE_FAIL
  disassembler_roundtrip:
    input: encoded_bytes
    output: DISASSEMBLY_IR
    fail: DISASM_ROUNDTRIP_FAIL
  program_image_smoke:
    input: encoded_bytes
    output: PROGRAM_IMAGE_IR
    fail: PROGRAM_IMAGE_LAYOUT_FAIL
  entry_symbol_resolve_smoke:
    input: PROGRAM_IMAGE_IR
    output: entry_pc
    fail: ENTRY_SYMBOL_RESOLVE_FAIL
  runtime_launch_smoke:
    input: PROGRAM_IMAGE_IR
    output: RUNTIME_LAUNCH_IR
    fail: RUNTIME_ARG_ENCODING_FAIL
  loader_smoke:
    input: PROGRAM_IMAGE_IR
    output: LOADER_CONTRACT_IR
    fail: LOADER_CONTRACT_FAIL
  golden_image_execution_smoke:
    input: PROGRAM_IMAGE_IR
    output: expected_memory_dump
    fail: GOLDEN_IMAGE_EXECUTION_FAIL
