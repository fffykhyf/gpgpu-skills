table: artifact_visibility_table
version: v1
visibility_classes:
  HUMAN_REQUIRED:
    description: Must be shown to the user by default.
    language: zh-CN
    default_show_to_human: true
  HUMAN_OPTIONAL:
    description: Can be shown if requested or during contract freeze review.
    language: zh-CN
    default_show_to_human: false
  AI_REQUIRED:
    description: Must be generated for downstream skills, not shown by default.
    language: en-US
    default_show_to_human: false
  DEBUG_ONLY:
    description: Generated or expanded on failure, ambiguity, or regression.
    language: en-US
    default_show_to_human: false
  INTERNAL_CACHE:
    description: Stored for hashes, fingerprints, cache keys, and regression tracking.
    language: en-US
    default_show_to_human: false
artifact_defaults:
  human_reports:
    visibility: HUMAN_REQUIRED
    language: zh-CN
    filename_suffix: ".zh.md"
  ai_artifacts:
    visibility: AI_REQUIRED
    language: en-US
    filename_suffixes: [".yaml", ".json", ".en.md"]
  debug_evidence:
    visibility: DEBUG_ONLY
    language: en-US
    filename_suffixes: [".yaml", ".json", ".en.md"]
  internal_cache:
    visibility: INTERNAL_CACHE
    language: en-US
    filename_suffixes: [".yaml", ".json"]
expansion_triggers:
  - user_explicit_request
  - contract_freeze_human_review
  - root_cause_ambiguous
  - regression_reappears
  - downstream_owner_needs_exact_fields
