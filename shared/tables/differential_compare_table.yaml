version: v5
compare_order:
  - PC_MISMATCH
  - NEXT_PC_MISMATCH
  - DECODE_MISMATCH
  - ACTIVE_MASK_MISMATCH
  - PREDICATE_MASK_MISMATCH
  - REGISTER_WRITEBACK_MISMATCH
  - MEMORY_ADDRESS_MISMATCH
  - MEMORY_BYTE_ENABLE_MISMATCH
  - MEMORY_VALUE_MISMATCH
  - RESPONSE_TAG_MISMATCH
  - CSR_MISMATCH
  - BARRIER_STATE_MISMATCH
  - FAULT_STATUS_MISMATCH
  - COMPLETION_STATUS_MISMATCH
required_event_fields:
  PC_MISMATCH: [pc]
  NEXT_PC_MISMATCH: [next_pc]
  DECODE_MISMATCH: [decoded_instruction]
  ACTIVE_MASK_MISMATCH: [active_mask]
  PREDICATE_MASK_MISMATCH: [predicate_mask]
  REGISTER_WRITEBACK_MISMATCH: [dst_regs, reg_values_after]
  MEMORY_ADDRESS_MISMATCH: [memory_addr, access_size]
  MEMORY_BYTE_ENABLE_MISMATCH: [byte_enable, lane_mask]
  MEMORY_VALUE_MISMATCH: [memory_addr, reg_values_after]
  RESPONSE_TAG_MISMATCH: [request_tag, response_tag]
  CSR_MISMATCH: [csr_addr, csr_value]
  BARRIER_STATE_MISMATCH: [event_type, dependencies]
  FAULT_STATUS_MISMATCH: [fault_code]
  COMPLETION_STATUS_MISMATCH: [event_type]
ranking_rule: first_deterministic_architectural_divergence
