table: performance_taxonomy
version: compact-v1
merged_sections:
  - source_id: performance_metric_table.yaml
    content: |
      version: v5
      metric_groups:
        correctness_only_smoke:
          required_metrics: [total_cycles]
          graph_required: false
        standard_validation:
          required_metrics: [total_cycles, ipc, issue_utilization, stall_breakdown]
          graph_required: false
        performance_gate:
          required_metrics:
            - total_cycles
            - active_cycles
            - issue_cycles
            - commit_cycles
            - ipc
            - warp_eligible_rate
            - warp_issue_rate
            - issue_utilization
            - pipeline_utilization
            - stall_breakdown
            - memory_metrics
            - scheduler_metrics
            - backend_perf_evidence
          graph_required: true
      warning_thresholds:
        LOW_ISSUE_UTILIZATION: issue_utilization_below_target
        HIGH_MEMORY_STALL: memory_wait_dominates_stall_breakdown
        HIGH_BANK_CONFLICT: shared_bank_conflict_rate_above_target
        HIGH_COALESCING_AMPLIFICATION: coalesced_transaction_count_above_target
        HIGH_CACHE_RESERVATION_FAIL: cache_reservation_fail_above_target
        HIGH_MSHR_FAIL: mshr_fail_above_target
        HIGH_ICNT_REQ_BACKPRESSURE: icnt_req_backpressure_above_target
        HIGH_ICNT_RETURN_BACKPRESSURE: icnt_return_backpressure_above_target
        HIGH_L2_QUEUE_FULL: l2_queue_full_above_target
        HIGH_DRAM_QUEUE_FULL: dram_queue_full_above_target
        HIGH_INTERFACE_BACKPRESSURE: interface_backpressure_above_target
        LOW_OCCUPANCY: ready_warp_count_avg_below_target
        COUNTER_WITHOUT_PRODUCER: stable_counter_missing_producer_path
        POWER_USED_AS_PRIMARY_EVIDENCE: power_evidence_without_activity_counter_support
        PPA_CLAIM_WITHOUT_SYNTHESIS_BUNDLE: missing_utilization_timing_or_power_report
        POWER_CLAIM_WITHOUT_SAIF: missing_switching_activity_evidence
        FPGA_CLAIM_WITHOUT_BACKEND_RUN: missing_fpga_or_hw_run_log
        PERF_COUNTER_UNBOUND_TO_CONTRACT: counter_missing_contract_path
      xiangshan_weighted_sampling:
        required_artifacts:
          - PHASE_FEATURE
          - CHECKPOINT_PACKAGE
          - WEIGHTED_PERF_REPORT
          - TOPDOWN_GPGPU_ATTRIBUTION
        gate_order:
          - correctness_diff
          - representative_checkpoint_replay
          - weighted_attribution
        topdown_buckets:
          - frontend_fetch_decode_idle
          - warp_scheduling_stall
          - scoreboard_dependency_stall
          - memory_pipeline_stall
          - synchronization_stall
          - tensor_alu_busy
          - structural_conflict
  - source_id: bottleneck_template_table.yaml
    content: |
      version: v5
      templates:
        memory_latency_template:
          required_nodes: [cycle_window, warp, memory_request, memory_response, rtl_pipeline_stage, contract_rule]
          dominant_stall_reasons: [memory_wait]
        shared_bank_conflict_template:
          required_nodes: [cycle_window, warp, bank_conflict, rtl_pipeline_stage, contract_rule]
          dominant_stall_reasons: [bank_conflict]
        scoreboard_dependency_template:
          required_nodes: [cycle_window, warp, scoreboard_dependency, register_writeback, contract_rule]
          dominant_stall_reasons: [scoreboard_dependency]
        scheduler_underutilization_template:
          required_nodes: [cycle_window, scheduler_state, scoreboard_dependency, rtl_pipeline_stage, contract_rule]
          dominant_stall_reasons: [no_ready_warp]
        barrier_synchronization_template:
          required_nodes: [cycle_window, barrier_state, warp, rtl_pipeline_stage, contract_rule]
          dominant_stall_reasons: [barrier_wait]
        branch_divergence_template:
          required_nodes: [cycle_window, branch_divergence, active_mask_event, contract_rule]
          dominant_stall_reasons: [divergence_reconvergence]
        pipeline_imbalance_template:
          required_nodes: [cycle_window, rtl_pipeline_stage, bottleneck_category, contract_rule]
          dominant_stall_reasons: [pipeline_busy]
        interface_backpressure_template:
          required_nodes: [cycle_window, interface_backpressure, rtl_pipeline_stage, contract_rule]
          dominant_stall_reasons: [interface_backpressure]
        toolchain_mismatch_template:
          required_nodes: [instruction, toolchain_artifact, contract_rule]
          dominant_stall_reasons: []
        runtime_launch_mismatch_template:
          required_nodes: [runtime_launch_event, toolchain_artifact, contract_rule]
          dominant_stall_reasons: [runtime_wait]
