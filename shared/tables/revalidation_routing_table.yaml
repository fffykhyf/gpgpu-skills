version: v5
routes:
  ARCHITECTURE_PATCH:
    required_modules:
      - gpgpu-arch
      - gpgpu-golden
      - gpgpu-runtime
      - gpgpu-rtl
      - gpgpu-simppa
  CONTRACT_PATCH:
    required_modules:
      - gpgpu-golden
      - gpgpu-runtime
      - gpgpu-rtl
      - gpgpu-simppa
  MEMORY_PATH_PATCH:
    required_modules:
      - gpgpu-memory
      - gpgpu-golden
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - lsu_lane_format_test
      - memory_tag_lifetime_test
      - coalescer_restore_test
      - mshr_replay_test
      - cache_response_routing_test
      - rtl_golden_trace_diff
  FABRIC_PATCH:
    required_modules:
      - gpgpu-interconnect
      - gpgpu-golden
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - fabric_request_response_test
      - l2_slice_route_test
      - response_demux_test
      - fabric_queue_backpressure_test
      - multi_sm_trace_partition_test
  SYNC_ATOMIC_PATCH:
    required_modules:
      - gpgpu-atomic-sync
      - gpgpu-golden
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - atomic_same_address_test
      - visibility_event_test
      - fence_visibility_test
      - barrier_phase_test
      - wsync_drain_test
      - rtl_golden_trace_diff
  GOLDEN_SEMANTICS_PATCH:
    required_modules:
      - gpgpu-golden
      - gpgpu-simppa
    required_gates:
      - contract_fragment_freeze_check
      - executable_semantics_check
      - golden_image_execution
      - module_twin_trace_diff
  RTL_BINDING_PATCH:
    required_modules:
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - interface_binding_check
      - module_partial_sim
      - trace_adapter_field_check
      - rtl_golden_trace_diff
  GOLDEN_MODEL_PATCH:
    required_modules:
      - gpgpu-golden
      - gpgpu-runtime
      - gpgpu-simppa
    required_gates:
      - executable_semantics_check
      - golden_image_execution
      - rtl_golden_trace_diff
  TOOLCHAIN_PATCH:
    required_modules:
      - gpgpu-runtime
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - regenerate_TOOLCHAIN_ARTIFACT_IR
      - assembler_smoke
      - disassembler_roundtrip
      - program_image_smoke
      - loader_contract_smoke
      - golden_image_execution
      - rtl_image_load_smoke
      - trace_diff
  RUNTIME_PATCH:
    required_modules:
      - gpgpu-runtime
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - runtime_arg_encoding
      - csr_launch_sequence
      - completion_fault_observation
      - rtl_golden_trace_diff
  RUNTIME_ABI_PATCH:
    required_modules:
      - gpgpu-runtime
      - gpgpu-golden
      - gpgpu-simppa
    required_gates:
      - launch_descriptor_roundtrip
      - argument_layout_roundtrip
      - compatibility_profile_check
      - golden_image_execution
  RTL_PATCH:
    required_modules:
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - module_partial_sim
      - rtl_golden_trace_diff
      - memory_dump_compare
  MEMORY_PATCH:
    required_modules:
      - gpgpu-memory
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - warp_memory_transaction_trace
      - coalescer_output_trace
      - cache_status_matrix
      - memory_lifecycle_trace
  INTERCONNECT_PATCH:
    required_modules:
      - gpgpu-interconnect
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - noc_packet_trace
      - icnt_backpressure_trace
      - queue_boundary_report
  ATOMIC_SYNC_PATCH:
    required_modules:
      - gpgpu-atomic-sync
      - gpgpu-golden
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - atomic_operation_contract
      - fence_visibility_test
      - cta_barrier_release_test
      - rtl_golden_trace_diff
  COUNTER_SCHEMA_PATCH:
    required_modules:
      - gpgpu-simppa
    required_gates:
      - counter_manifest_validation
      - counter_producer_audit
      - stall_reason_matrix_validation
  SIMULATOR_ARTIFACT_REMOVAL_PATCH:
    required_modules:
      - gpgpu-arch
      - gpgpu-golden
      - gpgpu-rtl
      - gpgpu-simppa
    required_gates:
      - config_classification_check
      - simulator_artifact_rejection_report
      - contract_diff_check
  TEST_EVIDENCE_PATCH:
    required_modules:
      - gpgpu-simppa
    required_gates:
      - trace_completeness_check
      - coverage_check
  PASS_EVIDENCE_PATCH:
    required_modules:
      - gpgpu-simppa
    required_gates:
      - pass_evidence_report
      - regression_fingerprint
      - coverage_check
root_cause_to_patch_route:
  TOOLCHAIN_ROOT_CAUSE:
    patch_type: TOOLCHAIN_PATCH
    target_skill: gpgpu-runtime
    revalidation: [assembler_smoke, disassembler_roundtrip, program_image_smoke, loader_contract_smoke, rtl_first_fetch_decode, golden_image_execution, rtl_golden_trace_diff]
  RUNTIME_LAUNCH_ROOT_CAUSE:
    patch_type: RUNTIME_PATCH
    target_skill: gpgpu-runtime
    revalidation: [runtime_arg_encoding, csr_launch_sequence, completion_fault_observation, rtl_golden_trace_diff]
  COUNTER_SCHEMA_ROOT_CAUSE:
    patch_type: COUNTER_SCHEMA_PATCH
    target_skill: gpgpu-simppa
    revalidation: [counter_manifest_validation, counter_producer_audit, stall_reason_matrix_validation]
  CONFIG_DRIFT_ROOT_CAUSE:
    patch_type: SIMULATOR_ARTIFACT_REMOVAL_PATCH
    target_skill: gpgpu-arch
    revalidation: [config_classification_check, simulator_artifact_rejection_report, contract_diff_check]
  ATTRIBUTION_VALIDITY_ROOT_CAUSE:
    patch_type: TEST_EVIDENCE_PATCH
    target_skill: gpgpu-simppa
    revalidation: [perf_attribution_graph, counter_producer_audit, trace_completeness_check]
  SIMULATOR_ARTIFACT_ROOT_CAUSE:
    patch_type: SIMULATOR_ARTIFACT_REMOVAL_PATCH
    target_skill: gpgpu-arch
    revalidation: [simulator_artifact_rejection_report, config_classification_check, rtl_contract_check]
  RTL_FUNCTIONAL_ROOT_CAUSE:
    patch_type: RTL_PATCH
    target_skill: gpgpu-rtl
    revalidation: [module_partial_sim, rtl_golden_trace_diff, memory_dump_compare]
  MEMORY_SYSTEM_ROOT_CAUSE:
    patch_type: RTL_PATCH
    target_skill: gpgpu-rtl
    revalidation: [module_partial_sim, memory_response_restore, rtl_golden_trace_diff, memory_dump_compare]
  MEMORY_PATH_ROOT_CAUSE:
    patch_type: MEMORY_PATH_PATCH
    target_skill: gpgpu-memory
    revalidation: [lsu_lane_format_test, memory_tag_lifetime_test, coalescer_restore_test, rtl_golden_trace_diff]
  FABRIC_ROOT_CAUSE:
    patch_type: FABRIC_PATCH
    target_skill: gpgpu-interconnect
    revalidation: [fabric_request_response_test, l2_slice_route_test, response_demux_test, multi_sm_trace_partition_test]
  CACHE_MSHR_ROOT_CAUSE:
    patch_type: MEMORY_PATH_PATCH
    target_skill: gpgpu-memory
    revalidation: [mshr_replay_test, cache_response_routing_test, no_deadlock_watchdog, rtl_golden_trace_diff]
  DRAM_ROOT_CAUSE:
    patch_type: MEMORY_PATH_PATCH
    target_skill: gpgpu-memory
    revalidation: [dram_schedule_test, dram_bank_conflict_test, memory_visibility_order_test, rtl_golden_trace_diff]
  SYNC_ATOMIC_ROOT_CAUSE:
    patch_type: SYNC_ATOMIC_PATCH
    target_skill: gpgpu-atomic-sync
    revalidation: [atomic_same_address_test, fence_visibility_test, barrier_phase_test, wsync_drain_test, rtl_golden_trace_diff]
  COALESCER_RESPONSE_SHAPE_MISMATCH:
    patch_type: MEMORY_PATH_PATCH
    target_skill: gpgpu-memory
    revalidation: [coalescer_restore_test, rtl_golden_trace_diff, scoreboard_release_eop_check]
  L2_SLICE_ROUTE_MISMATCH:
    patch_type: FABRIC_PATCH
    target_skill: gpgpu-interconnect
    revalidation: [l2_slice_route_test, response_demux_test, multi_sm_trace_partition_test]
  MSHR_REPLAY_MISMATCH:
    patch_type: MEMORY_PATH_PATCH
    target_skill: gpgpu-memory
    revalidation: [mshr_replay_test, cache_response_routing_test, no_deadlock_watchdog]
  ATOMIC_SERIALIZATION_MISMATCH:
    patch_type: SYNC_ATOMIC_PATCH
    target_skill: gpgpu-atomic-sync
    revalidation: [atomic_same_address_test, visibility_event_test, rtl_golden_trace_diff]
  FENCE_DRAIN_INCOMPLETE:
    patch_type: SYNC_ATOMIC_PATCH
    target_skill: gpgpu-atomic-sync
    revalidation: [fence_visibility_test, memory_visibility_order_test]
  PERFORMANCE_ARCH_ROOT_CAUSE:
    patch_type: ARCHITECTURE_PATCH
    target_skill: gpgpu-arch
    revalidation: [arch_constraint_check, performance_metric_extract, perf_attribution_graph, alternative_patch_rejection, ppa_estimate_if_available]
  TEST_EVIDENCE_ROOT_CAUSE:
    patch_type: TEST_EVIDENCE_PATCH
    target_skill: gpgpu-simppa
    revalidation: [trace_completeness_check, coverage_check]
