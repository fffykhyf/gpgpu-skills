table: rtl_binding_rules
version: compact-v1
merged_sections:
  - source_id: module_interface_contract_table.yaml
    content: |
      version: v5
      interface_binding_ir:
        required:
          - interface_id
          - producer_module
          - consumer_module
          - protocol
          - payload
          - handshake
          - ordering
          - latency
          - reset
          - trace_tap
          - adapter
        protocol_types: [VALID_READY, REQ_RSP_TAGGED, CSR_MMIO, STREAM]
        payload_field_required:
          - name
          - width
          - signedness
          - semantic_path
        handshake_required:
          - accepted_when
          - stall_rule
          - payload_stability_when_stalled
        ordering_required:
          - in_order
          - tag_unique_until_response
        latency_required:
          - min
          - max
        reset_required:
          - valid_reset
          - ready_reset
        trace_tap_required:
          - fire_event
          - payload_fields
        adapter_required:
          - allowed
          - adapter_module
      checks:
        signal_width:
          failure_mode: SIGNAL_WIDTH_MISMATCH
        signedness:
          failure_mode: SIGNAL_SIGNEDNESS_MISMATCH
        semantic_path:
          failure_mode: CONTRACT_PATH_UNBOUND
        protocol_type:
          failure_mode: INTERFACE_PROTOCOL_MISMATCH
        accepted_when:
          failure_mode: INTERFACE_PROTOCOL_MISMATCH
        payload_stability_when_stalled:
          failure_mode: PAYLOAD_STABILITY_FAIL
        tag_unique_until_response:
          failure_mode: TAG_REUSE_BEFORE_RESPONSE
        latency_range:
          failure_mode: LATENCY_INCOMPATIBLE
        pipeline_boundary:
          failure_mode: PIPELINE_BOUNDARY_FAIL
        no_combinational_ready_loop:
          failure_mode: COMBINATIONAL_READY_LOOP
        backpressure_rule:
          failure_mode: BACKPRESSURE_DROP_OR_DUPLICATE
        trace_tap:
          failure_mode: TRACE_TAP_MISSING
      adapter_rules:
        explicit_adapter_required: true
        adapter_must_have_module_template: true
        silent_protocol_coercion: forbidden
  - source_id: rtl_partial_sim_gate_table.yaml
    content: |
      version: v5
      required_outputs:
        - local_trace_hash
        - local_scoreboard_result
        - interface_transaction_result
        - golden_slice_compare_result
        - timing_feedback_result
        - verdict
      module_partial_sim_cases:
        scoreboard:
          - case_id: raw_dependency_stall
            purpose: RAW dependency stall
            required_trace_fields: [warp_id, src_reg, dst_reg, dependency_stall]
            golden_slice: execution_model.scoreboard
          - case_id: writeback_wakeup
            purpose: writeback wakeup
            required_trace_fields: [warp_id, dst_reg, writeback_event, wakeup_event]
            golden_slice: state_model.scoreboard_state
          - case_id: multiple_warp_independence
            purpose: multiple warp independence
            required_trace_fields: [warp_id, dependency_bits, selected_warp]
            golden_slice: state_model.scoreboard_state
        warp_scheduler:
          - case_id: round_robin_fairness
            purpose: round-robin fairness
            required_trace_fields: [ready_warp_mask, scheduler_cursor, selected_warp]
            golden_slice: execution_model.scheduler
          - case_id: skip_stalled_warp
            purpose: skip stalled warp
            required_trace_fields: [ready_warp_mask, dependency_stall, selected_warp]
            golden_slice: execution_model.scheduler
          - case_id: no_ready_warp_idle
            purpose: no ready warp idle
            required_trace_fields: [ready_warp_mask, issue_valid]
            golden_slice: state_model.warp_state
        load_store_queue:
          - case_id: ready_low_payload_stable
            purpose: ready low payload stable
            required_trace_fields: [valid, ready, payload_before, payload_after]
            golden_slice: interface_semantics_model.payload_stability
          - case_id: tag_unique
            purpose: tag unique
            required_trace_fields: [request_tag, outstanding_tags, response_tag]
            golden_slice: interface_semantics_model.tag_uniqueness
          - case_id: response_wakeup
            purpose: response wakeup
            required_trace_fields: [response_tag, warp_id, wakeup_event]
            golden_slice: memory_model.request_lifecycle
          - case_id: fault_propagation
            purpose: fault propagation
            required_trace_fields: [fault_response, fault_code, trap_or_poison]
            golden_slice: memory_model.fault_behavior
        lds_bank_unit:
          - case_id: bank_conflict_stall
            purpose: bank conflict stall
            required_trace_fields: [bank_id, lane_mask, bank_conflict, stall]
            golden_slice: memory_model.request_lifecycle
          - case_id: lane_mask_byte_enable
            purpose: lane mask byte enable
            required_trace_fields: [lane_mask, access_size, byte_enable]
            golden_slice: memory_model.coalescing
          - case_id: aligned_misaligned_behavior
            purpose: aligned/misaligned behavior
            required_trace_fields: [address, alignment, response_or_fault]
            golden_slice: memory_model.fault_behavior
        csr_runtime_interface:
          - case_id: start
            purpose: start
            required_trace_fields: [start_bit, doorbell_write, launch_state]
            golden_slice: launch_model.abi
          - case_id: done
            purpose: done
            required_trace_fields: [done_bit, completion_status]
            golden_slice: launch_model.completion_fault_observation
          - case_id: fault
            purpose: fault
            required_trace_fields: [fault_bit, fault_code]
            golden_slice: launch_model.completion_fault_observation
          - case_id: kernel_entry
            purpose: kernel entry
            required_trace_fields: [kernel_entry, entry_pc]
            golden_slice: launch_model.kernel_entry
          - case_id: arg_base
            purpose: arg base
            required_trace_fields: [arg_base, decoded_arguments]
            golden_slice: launch_model.abi
        program_image_loader_interface:
          - case_id: program_image_load
            purpose: load program image into RTL-visible memories
            required_trace_fields: [segment_name, image_offset, loaded_bytes]
            golden_slice: launch_model.program_image_format
          - case_id: entry_pc_fetch
            purpose: entry PC comes from loader contract
            required_trace_fields: [entry_pc, entry_pc_source]
            golden_slice: launch_model.loader_contract
          - case_id: first_instruction_decode
            purpose: first instruction decodes through contract-derived table
            required_trace_fields: [entry_pc, encoded_instruction, decoded_instruction]
            golden_slice: isa_model.instruction_encodings
        runtime_arg_buffer_interface:
          - case_id: arg_buffer_visible
            purpose: runtime argument buffer visible to RTL
            required_trace_fields: [arg_base, arg_buffer_offset, arg_bytes, decoded_argument]
            golden_slice: launch_model.argument_buffer_layout
      gates:
        local_scoreboard_result:
          pass_value: PASS
          failure_mode: PARTIAL_SIM_FAIL
        interface_transaction_result:
          pass_value: PASS
          failure_mode: INTERFACE_PROTOCOL_MICUATCH
        golden_slice_compare_result:
          pass_value: PASS
          failure_mode: GOLDEN_SLICE_MICUATCH
        timing_feedback_result:
          required_checks:
            - local_timing_risk
            - critical_signal_paths
            - estimated_register_count
            - estimated_sram_macro_need
            - fanout_risk
            - combinational_ready_loop_check
          failure_mode: TIMING_FEEDBACK_MISSING
        no_combinational_ready_loop:
          pass_value: true
          failure_mode: COMBINATIONAL_READY_LOOP
        program_image_load:
          pass_value: PASS
          failure_mode: PROGRAM_IMAGE_LOAD_FAIL
        entry_pc_fetch:
          pass_value: PASS
          failure_mode: ENTRY_PC_FETCH_FAIL
        first_instruction_decode:
          pass_value: PASS
          failure_mode: FIRST_INSTRUCTION_DECODE_FAIL
        arg_buffer_visible:
          pass_value: PASS
          failure_mode: ARG_BUFFER_VISIBILITY_FAIL
  - source_id: verification_backend_matrix.yaml
    content: |
      table: verification_backend_matrix
      version: v5
      gate_classes:
        toolchain_smoke:
          required_for: [all]
          checks:
            - assembler_roundtrip
            - program_image_layout
            - loader_contract
        runtime_launch:
          required_for: [vertical_slice, fpga_target]
          checks:
            - arg_encoding
            - entry_pc
            - start_done
            - fault_visibility
        module_unit:
          required_for: [rtl_module_change]
          checks:
            - local_golden_compare
            - interface_protocol
            - trace_tap
        rtl_sim:
          required_for: [rtl_change]
          checks:
            - rtl_vs_golden
            - normalized_trace_diff
        regression:
          required_for: [contract_freeze, release_candidate]
          checks:
            - divergence
            - memory
            - barrier
            - runtime
        synthesis:
          required_for: [ppa_claim, fpga_target]
          checks:
            - utilization
            - timing
            - power
            - saif_coverage
        fpga_smoke:
          required_for: [fpga_target]
          checks:
            - bitstream_or_hw_run
            - host_runtime
            - memory_result
source_files:
  - module_interface_contract_table.yaml
  - rtl_partial_sim_gate_table.yaml
  - verification_backend_matrix.yaml
