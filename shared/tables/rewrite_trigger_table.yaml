version: v5
triggers:
  CONTRACT_ROOT_CAUSE:
    patch_options: [CONTRACT_PATCH]
  GOLDEN_MODEL_ROOT_CAUSE:
    patch_options: [GOLDEN_MODEL_PATCH, CONTRACT_PATCH]
  TOOLCHAIN_ROOT_CAUSE:
    patch_options: [TOOLCHAIN_PATCH]
  RUNTIME_LAUNCH_ROOT_CAUSE:
    patch_options: [RUNTIME_PATCH]
  RTL_FUNCTIONAL_ROOT_CAUSE:
    patch_options: [RTL_PATCH]
  RTL_INTERFACE_ROOT_CAUSE:
    patch_options: [RTL_PATCH]
  MEMORY_SYSTEM_ROOT_CAUSE:
    patch_options: [RTL_PATCH, ARCHITECTURE_PATCH]
  MEMORY_PATH_ROOT_CAUSE:
    patch_options: [MEMORY_PATH_PATCH]
  FABRIC_ROOT_CAUSE:
    patch_options: [FABRIC_PATCH]
  CACHE_MSHR_ROOT_CAUSE:
    patch_options: [MEMORY_PATH_PATCH]
  DRAM_ROOT_CAUSE:
    patch_options: [MEMORY_PATH_PATCH]
  SYNC_ATOMIC_ROOT_CAUSE:
    patch_options: [SYNC_ATOMIC_PATCH]
  SCHEDULER_ROOT_CAUSE:
    patch_options: [RTL_PATCH, ARCHITECTURE_PATCH]
  PERFORMANCE_ARCH_ROOT_CAUSE:
    patch_options: [ARCHITECTURE_PATCH]
  TEST_EVIDENCE_ROOT_CAUSE:
    patch_options: [TEST_EVIDENCE_PATCH, PASS_EVIDENCE_PATCH]
  INSUFFICIENT_TRACE_EVIDENCE:
    patch_options: [TEST_EVIDENCE_PATCH]
  ROOT_CAUSE_AMBIGUOUS:
    patch_options: [TEST_EVIDENCE_PATCH]
required_evidence:
  failure_mode:
    - CORRECTNESS_GATE_REPORT
    - FIRST_DIVERGENCE_REPORT
    - PERF_ATTRIBUTION_GRAPH
    - ROOT_CAUSE_REPORT
  pass_mode:
    - CORRECTNESS_GATE_REPORT
    - PASS_EVIDENCE_REPORT
    - TRACE_COVERAGE_REPORT
    - PERFORMANCE_METRIC_IR
    - REGRESSION_FINGERPRINT
rewrite_blockers:
  - missing_owner_skill
  - missing_revalidation_route
  - ambiguous_root_cause_without_evidence_patch
  - architecture_patch_without_alternative_rejection
  - performance_arch_root_cause_without_counter_evidence
