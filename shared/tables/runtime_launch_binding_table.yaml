table: runtime_launch_binding_table
version: v5
source: SYSTEM_CONTRACT_IR.launch_model
bindings:
  launch_abi: launch_model.abi
  grid_block_thread_mapping: launch_model.grid_block_thread_mapping
  kernel_entry: launch_model.kernel_entry
  argument_buffer_layout: launch_model.argument_buffer_layout
  completion_fault_observation: launch_model.completion_fault_observation
csr_write_sequence:
  - kernel_entry
  - arg_base
  - grid_dim
  - block_dim
  - start
completion_observation:
  - done_bit
  - fault_bit
  - status
failure_modes:
  arg_encoding: RUNTIME_ARG_ENCODING_FAIL
  entry: ENTRY_SYMBOL_RESOLVE_FAIL
