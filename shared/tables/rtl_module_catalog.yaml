version: v5
modules:
  sm_top:
    template: sm_top_template
    required_contract_paths: [architecture_model.sm_count, architecture_model.warp_slots_per_sm, interface_semantics_model.request_acceptance]
    required_interfaces: [csr_runtime_interface, warp_scheduler, decode_issue_unit]
  warp_scheduler:
    template: warp_scheduler_template
    required_contract_paths: [execution_model.scheduler, state_model.scheduler_state, state_model.warp_state]
    required_interfaces: [scoreboard, decode_issue_unit]
  decode_issue_unit:
    template: decode_issue_unit_template
    required_contract_paths: [isa_model.opcodes, isa_model.instruction_encodings, execution_model.simt, state_model.pipeline_visible_state]
    required_interfaces: [register_file, scoreboard, load_store_queue, fault_completion_unit]
  register_file:
    template: register_file_template
    required_contract_paths: [state_model.register_file_state, config_contract.hw_sw_abi]
    required_interfaces: [decode_issue_unit]
  scoreboard:
    template: scoreboard_template
    required_contract_paths: [execution_model.scoreboard, state_model.scoreboard_state]
    required_interfaces: [warp_scheduler, decode_issue_unit, load_store_queue, memory_response_router]
  simt_stack:
    template: simt_stack_template
    required_contract_paths: [execution_model.features.simt_divergence, state_model.simt_stack_state]
    required_interfaces: [decode_issue_unit, warp_scheduler]
    optional_when_feature_disabled: execution_model.features.simt_divergence
  load_store_queue:
    template: lsq_template
    required_contract_paths: [memory_model.request_lifecycle, memory_model.ordering, state_model.memory_stall_state]
    required_interfaces: [decode_issue_unit, scoreboard, coalescer, memory_response_router, fault_completion_unit]
  lsu_slice:
    template: lsu_slice_template
    required_contract_paths: [memory.lsu_lane_format, memory.nonblocking_memory_tag]
    required_interfaces: [decode_issue_unit, memory_scheduler, local_memory_bank, l1_global_adapter]
  memory_scheduler:
    template: memory_scheduler_template
    required_contract_paths: [memory.nonblocking_memory_tag, memory.mshr_replay]
    required_interfaces: [lsu_slice, memory_coalescer, scoreboard, cache_response_router]
  memory_coalescer:
    template: memory_coalescer_template
    required_contract_paths: [memory.coalescer_response_restore, memory.nonblocking_memory_tag]
    required_interfaces: [memory_scheduler, local_memory_bank, l1_global_adapter, cache_response_router]
  local_memory_bank:
    template: local_memory_bank_template
    required_contract_paths: [memory.local_memory_bank, sync.barrier_phase]
    required_interfaces: [memory_coalescer, cache_response_router, barrier_unit]
  l1_cache_bank:
    template: l1_cache_bank_template
    required_contract_paths: [memory.l1_cache_or_global_adapter, memory.nonblocking_memory_tag]
    required_interfaces: [memory_coalescer, cache_response_router, fabric_router]
  l1_global_adapter:
    template: l1_global_adapter_template
    required_contract_paths: [memory.l1_cache_or_global_adapter, fabric.fabric_request_response]
    required_interfaces: [memory_coalescer, cache_response_router, fabric_router]
  l2_cache_slice:
    template: l2_cache_slice_template
    required_contract_paths: [memory.l2_cache_slice, interconnect.l2_slice_routing]
    required_interfaces: [fabric_router, l2_mshr, cache_response_router, dram_controller]
  l2_mshr:
    template: l2_mshr_template
    required_contract_paths: [memory.mshr_replay, memory.cache_response_routing]
    required_interfaces: [l2_cache_slice, dram_controller, cache_response_router]
  cache_response_router:
    template: cache_response_router_template
    required_contract_paths: [memory.cache_response_routing, interconnect.response_demux]
    required_interfaces: [memory_scheduler, l1_cache_bank, l2_cache_slice, l2_mshr, scoreboard]
  fabric_router:
    template: fabric_router_template
    required_contract_paths: [interconnect.fabric_request_response, interconnect.l2_slice_routing, interconnect.fabric_queue_backpressure]
    required_interfaces: [l1_global_adapter, l1_cache_bank, l2_cache_slice, atomic_unit, fence_drain_unit]
  dram_controller:
    template: dram_controller_template
    required_contract_paths: [memory.dram_controller, memory.memory_visibility]
    required_interfaces: [l2_cache_slice, l2_mshr, cache_response_router]
  atomic_unit:
    template: atomic_unit_template
    required_contract_paths: [sync.atomic_serialization, memory.memory_visibility]
    required_interfaces: [fabric_router, cache_response_router]
  fence_drain_unit:
    template: fence_drain_unit_template
    required_contract_paths: [sync.fence_visibility, memory.memory_visibility]
    required_interfaces: [fabric_router, memory_scheduler, cache_response_router]
  barrier_unit:
    template: barrier_unit_template
    required_contract_paths: [sync.barrier_phase, memory.local_memory_bank]
    required_interfaces: [warp_control_unit, memory_scheduler, local_memory_bank]
  wsync_drain_unit:
    template: wsync_drain_unit_template
    required_contract_paths: [sync.wsync_drain, memory.nonblocking_memory_tag]
    required_interfaces: [warp_control_unit, memory_scheduler, scoreboard]
  trace_adapter:
    template: trace_adapter_template
    required_contract_paths: [trace.normalized_trace_ir, rtl.module_twin_trace]
    required_interfaces: [all_bound_modules, simppa_trace_ingestion]
  coalescer:
    template: coalescer_template
    required_contract_paths: [memory_model.coalescing, memory_model.address_spaces]
    required_interfaces: [load_store_queue, lds_bank_unit, l1_cache_or_global_adapter]
  lds_bank_unit:
    template: lds_bank_unit_template
    required_contract_paths: [memory_model.address_spaces, memory_model.request_lifecycle]
    required_interfaces: [coalescer, memory_response_router]
  l1_cache_or_global_adapter:
    template: l1_cache_or_global_adapter_template
    required_contract_paths: [memory_model.address_spaces, memory_model.request_lifecycle, memory_model.fault_behavior]
    required_interfaces: [coalescer, memory_response_router, interconnect]
  memory_response_router:
    template: memory_response_router_template
    required_contract_paths: [memory_model.request_lifecycle, interface_semantics_model.tag_uniqueness, interface_semantics_model.response_ordering]
    required_interfaces: [load_store_queue, scoreboard, lds_bank_unit, l1_cache_or_global_adapter, fault_completion_unit]
  fault_completion_unit:
    template: fault_completion_unit_template
    required_contract_paths: [memory_model.fault_behavior, launch_model.completion_fault_observation, interface_semantics_model.fault_response]
    required_interfaces: [decode_issue_unit, load_store_queue, memory_response_router, csr_runtime_interface]
  interconnect:
    template: interconnect_template
    required_contract_paths: [interface_semantics_model.request_acceptance, interface_semantics_model.payload_stability, interface_semantics_model.response_ordering]
    required_interfaces: [l1_cache_or_global_adapter, csr_runtime_interface]
  csr_runtime_interface:
    template: csr_runtime_template
    required_contract_paths: [launch_model.abi, launch_model.kernel_entry, launch_model.argument_buffer_layout, launch_model.completion_fault_observation, config_contract.hw_sw_abi]
    required_artifacts: [RUNTIME_LAUNCH_IR, LOADER_CONTRACT_IR]
    required_interfaces: [sm_top, fault_completion_unit, interconnect, runtime_arg_buffer_interface]
  program_image_loader_interface:
    template: program_image_loader_template
    required_contract_paths: [launch_model.program_image_format, launch_model.loader_contract, launch_model.kernel_entry]
    required_artifacts: [PROGRAM_IMAGE_IR, LOADER_CONTRACT_IR]
    required_interfaces: [instruction_memory_init, runtime_arg_buffer_interface, sm_top]
  instruction_memory_init:
    template: instruction_memory_init_template
    required_contract_paths: [launch_model.program_image_format, isa_model.instruction_encodings]
    required_artifacts: [PROGRAM_IMAGE_IR, LOADER_CONTRACT_IR]
    required_interfaces: [program_image_loader_interface, decode_issue_unit]
  runtime_arg_buffer_interface:
    template: runtime_arg_buffer_template
    required_contract_paths: [launch_model.argument_buffer_layout, config_contract.hw_sw_abi]
    required_artifacts: [RUNTIME_LAUNCH_IR, LOADER_CONTRACT_IR]
    required_interfaces: [csr_runtime_interface, program_image_loader_interface, register_file]
module_binding_templates:
  warp_scheduler_template:
    required_contract_paths: [execution_model.scheduler, state_model.scheduler_state, state_model.warp_state]
    required_local_state: [scheduler_cursor, ready_warp_mask]
    required_input_interfaces: [scoreboard_to_warp_scheduler]
    required_output_interfaces: [warp_scheduler_to_decode_issue_unit]
    required_partial_sim_cases: [round_robin_fairness, skip_stalled_warp, no_ready_warp_idle]
    required_trace_fields: [cycle, ready_warp_mask, selected_warp, stall_reason]
    forbidden_hidden_state: [private_priority_override, uncontracted_warp_mask]
    timing_checks: [local_timing_risk, fanout_risk, no_combinational_ready_loop]
  scoreboard_template:
    required_contract_paths: [execution_model.scoreboard, state_model.scoreboard_state]
    required_local_state: [pending_register_bits, warp_dependency_matrix]
    required_input_interfaces: [decode_issue_unit_to_scoreboard, memory_response_router_to_scoreboard]
    required_output_interfaces: [scoreboard_to_warp_scheduler]
    required_partial_sim_cases: [raw_dependency_stall, writeback_wakeup, multiple_warp_independence]
    required_trace_fields: [cycle, warp_id, src_regs, dst_reg, dependency_stall, wakeup_event]
    forbidden_hidden_state: [untracked_dependency_bit, global_single_warp_stall]
    timing_checks: [fanout_risk, no_combinational_ready_loop]
  register_file_template:
    required_contract_paths: [state_model.register_file_state, config_contract.hw_sw_abi]
    required_local_state: [integer_registers]
    required_input_interfaces: [decode_issue_unit_to_register_file]
    required_output_interfaces: [register_file_to_decode_issue_unit]
    required_partial_sim_cases: [read_after_write_visibility, lane_masked_write, reset_zero_or_contract_init]
    required_trace_fields: [cycle, warp_id, lane_mask, read_addr, write_addr, write_data]
    forbidden_hidden_state: [implicit_register_alias, undocumented_zero_register]
    timing_checks: [estimated_register_count, fanout_risk]
  lsq_template:
    required_contract_paths: [memory_model.request_lifecycle, memory_model.ordering, state_model.memory_stall_state]
    required_local_state: [pending_memory_ops, request_tags, stall_state]
    required_input_interfaces: [decode_issue_unit_to_load_store_queue, memory_response_router_to_load_store_queue]
    required_output_interfaces: [load_store_queue_to_coalescer, load_store_queue_to_fault_completion_unit]
    required_partial_sim_cases: [ready_low_payload_stable, tag_unique, response_wakeup, fault_propagation]
    required_trace_fields: [cycle, warp_id, op_id, request_tag, addr, lane_mask, stall, response, fault]
    forbidden_hidden_state: [untracked_replay_queue, implicit_tag_allocator]
    timing_checks: [local_timing_risk, no_combinational_ready_loop]
  coalescer_template:
    required_contract_paths: [memory_model.coalescing, memory_model.address_spaces]
    required_local_state: [lane_request_buffer]
    required_input_interfaces: [load_store_queue_to_coalescer]
    required_output_interfaces: [coalescer_to_lds_bank_unit, coalescer_to_l1_cache_or_global_adapter]
    required_partial_sim_cases: [lane_mask_byte_enable, contiguous_lane_coalescing, invalid_address_reject]
    required_trace_fields: [cycle, lane_mask, addresses, byte_enable, coalesced_transactions]
    forbidden_hidden_state: [implicit_address_space_override]
    timing_checks: [critical_signal_paths, fanout_risk]
  lds_bank_unit_template:
    required_contract_paths: [memory_model.address_spaces, memory_model.request_lifecycle]
    required_local_state: [bank_busy_state, lds_array]
    required_input_interfaces: [coalescer_to_lds_bank_unit]
    required_output_interfaces: [lds_bank_unit_to_memory_response_router]
    required_partial_sim_cases: [bank_conflict_stall, lane_mask_byte_enable, aligned_misaligned_behavior]
    required_trace_fields: [cycle, bank_id, lane_mask, byte_enable, bank_conflict, response_tag]
    forbidden_hidden_state: [silent_bank_conflict_drop]
    timing_checks: [estimated_sram_macro_need, no_combinational_ready_loop]
  l1_cache_or_global_adapter_template:
    required_contract_paths: [memory_model.address_spaces, memory_model.request_lifecycle, memory_model.fault_behavior]
    required_local_state: [request_buffer, response_buffer]
    required_input_interfaces: [coalescer_to_l1_cache_or_global_adapter, interconnect_to_l1_cache_or_global_adapter]
    required_output_interfaces: [l1_cache_or_global_adapter_to_memory_response_router, l1_cache_or_global_adapter_to_interconnect]
    required_partial_sim_cases: [ready_low_payload_stable, global_response_match, fault_response]
    required_trace_fields: [cycle, request_tag, address, valid, ready, response, fault]
    forbidden_hidden_state: [uncontracted_cache_policy]
    timing_checks: [local_timing_risk, no_combinational_ready_loop]
  memory_response_router_template:
    required_contract_paths: [memory_model.request_lifecycle, interface_semantics_model.tag_uniqueness, interface_semantics_model.response_ordering]
    required_local_state: [outstanding_tag_table]
    required_input_interfaces: [lds_bank_unit_to_memory_response_router, l1_cache_or_global_adapter_to_memory_response_router]
    required_output_interfaces: [memory_response_router_to_load_store_queue, memory_response_router_to_scoreboard, memory_response_router_to_fault_completion_unit]
    required_partial_sim_cases: [tag_unique, response_wakeup, fault_propagation]
    required_trace_fields: [cycle, response_tag, target_warp, wakeup, fault]
    forbidden_hidden_state: [tag_rewrite_without_trace]
    timing_checks: [fanout_risk, no_combinational_ready_loop]
  fault_completion_unit_template:
    required_contract_paths: [memory_model.fault_behavior, launch_model.completion_fault_observation, interface_semantics_model.fault_response]
    required_local_state: [completion_status, fault_status]
    required_input_interfaces: [decode_issue_unit_to_fault_completion_unit, load_store_queue_to_fault_completion_unit, memory_response_router_to_fault_completion_unit]
    required_output_interfaces: [fault_completion_unit_to_csr_runtime_interface]
    required_partial_sim_cases: [fault_propagation, done_status, trap_or_poison_status]
    required_trace_fields: [cycle, fault_code, completion_status, csr_status]
    forbidden_hidden_state: [unreported_fault_latch]
    timing_checks: [local_timing_risk]
  csr_runtime_template:
    required_contract_paths: [launch_model.abi, launch_model.kernel_entry, launch_model.completion_fault_observation, config_contract.hw_sw_abi]
    required_local_state: [start_bit, done_bit, fault_bit, kernel_entry, arg_base]
    required_input_interfaces: [host_to_csr_runtime_interface, fault_completion_unit_to_csr_runtime_interface]
    required_output_interfaces: [csr_runtime_interface_to_sm_top]
    required_partial_sim_cases: [start, done, fault, kernel_entry, arg_base]
    required_trace_fields: [cycle, start, done, fault, kernel_entry, arg_base]
    forbidden_hidden_state: [undocumented_csr, untracked_arg_base]
    timing_checks: [no_combinational_ready_loop]
  program_image_loader_template:
    required_contract_paths: [launch_model.program_image_format, launch_model.loader_contract, launch_model.kernel_entry]
    required_local_state: [entry_pc_latch, imem_init_state, dmem_init_state]
    required_input_interfaces: [host_program_image_load]
    required_output_interfaces: [program_image_loader_to_instruction_memory_init, program_image_loader_to_sm_top]
    required_partial_sim_cases: [program_image_load, entry_pc_fetch, first_instruction_decode]
    required_trace_fields: [cycle, entry_pc, segment_name, image_offset, encoded_instruction]
    forbidden_hidden_state: [implicit_entry_pc, undocumented_image_layout]
    timing_checks: [local_timing_risk, no_combinational_ready_loop]
  instruction_memory_init_template:
    required_contract_paths: [launch_model.program_image_format, isa_model.instruction_encodings]
    required_local_state: [instruction_memory_array]
    required_input_interfaces: [program_image_loader_to_instruction_memory_init]
    required_output_interfaces: [instruction_memory_to_decode_issue_unit]
    required_partial_sim_cases: [program_image_load, first_instruction_decode]
    required_trace_fields: [cycle, pc, image_offset, encoded_instruction, decoded_instruction]
    forbidden_hidden_state: [instruction_patch_without_contract]
    timing_checks: [estimated_sram_macro_need, no_combinational_ready_loop]
  runtime_arg_buffer_template:
    required_contract_paths: [launch_model.argument_buffer_layout, config_contract.hw_sw_abi]
    required_local_state: [arg_buffer_base, arg_buffer_bytes_visible]
    required_input_interfaces: [csr_runtime_interface_to_runtime_arg_buffer]
    required_output_interfaces: [runtime_arg_buffer_to_register_file]
    required_partial_sim_cases: [arg_buffer_visible]
    required_trace_fields: [cycle, arg_base, arg_buffer_offset, arg_bytes, decoded_argument]
    forbidden_hidden_state: [implicit_argument_default]
    timing_checks: [local_timing_risk, no_combinational_ready_loop]
  lsu_slice_template:
    required_contract_paths: [memory.lsu_lane_format, memory.nonblocking_memory_tag]
    required_local_state: [lane_address_buffer, byte_enable_vector, shifted_store_data_buffer, load_format_state]
    required_input_interfaces: [decode_issue_unit_to_lsu_slice]
    required_output_interfaces: [lsu_slice_to_memory_scheduler, lsu_slice_to_local_memory_bank, lsu_slice_to_l1_global_adapter]
    required_partial_sim_cases: [aligned_load_store, misaligned_byte_enable, shifted_store_data, lane_mask_preserve, load_format_extend]
    required_trace_fields: [sm_id, warp_id, instruction_uuid, lane_mask, per_lane_addr, byte_enable, store_data_shifted, load_format_rule]
    forbidden_hidden_state: [implicit_lane_address_rewrite, untraced_byte_enable_default]
    timing_checks: [lane_fanout_risk, no_combinational_ready_loop]
  memory_scheduler_template:
    required_contract_paths: [memory.nonblocking_memory_tag, memory.mshr_replay]
    required_local_state: [outstanding_tag_table, request_queue, response_queue, replay_queue]
    required_input_interfaces: [lsu_slice_to_memory_scheduler, cache_response_router_to_memory_scheduler]
    required_output_interfaces: [memory_scheduler_to_memory_coalescer, memory_scheduler_to_scoreboard]
    required_partial_sim_cases: [tag_allocate_release, final_eop_release, response_backpressure, tag_reuse_forbidden]
    required_trace_fields: [sm_id, warp_id, instruction_uuid, request_tag, response_tag, final_eop, queue_occupancy]
    forbidden_hidden_state: [implicit_tag_allocator, scoreboard_release_without_final_eop]
    timing_checks: [queue_depth_bound, no_combinational_ready_loop]
  memory_coalescer_template:
    required_contract_paths: [memory.coalescer_response_restore, memory.nonblocking_memory_tag]
    required_local_state: [original_request_table, coalesced_tag_table, per_lane_offset_table]
    required_input_interfaces: [memory_scheduler_to_memory_coalescer]
    required_output_interfaces: [memory_coalescer_to_local_memory_bank, memory_coalescer_to_l1_global_adapter, memory_coalescer_to_cache_response_router]
    required_partial_sim_cases: [same_line_multi_lane_load, mixed_byte_enable_restore, response_shape_restore, tag_reuse_forbidden]
    required_trace_fields: [original_tag, coalesced_tag, lane_mask, byte_enable, per_lane_offset, restored_lane_data, final_eop]
    forbidden_hidden_state: [untraced_lane_restore_table, raw_response_scoreboard_release]
    timing_checks: [merge_table_depth, no_combinational_ready_loop]
  local_memory_bank_template:
    required_contract_paths: [memory.local_memory_bank, sync.barrier_phase]
    required_local_state: [bank_busy_state, local_memory_array, response_hold_register]
    required_input_interfaces: [memory_coalescer_to_local_memory_bank, barrier_unit_to_local_memory_bank]
    required_output_interfaces: [local_memory_bank_to_cache_response_router]
    required_partial_sim_cases: [shared_bank_conflict, same_bank_multi_lane_access, response_hold_under_backpressure, barrier_visibility]
    required_trace_fields: [sm_id, bank_id, lane_mask, byte_enable, queue_occupancy, barrier_id, visibility_event]
    forbidden_hidden_state: [silent_bank_conflict_drop, uncontracted_read_during_write_rule]
    timing_checks: [sram_macro_need, response_hold_no_ready_loop]
  l1_cache_bank_template:
    required_contract_paths: [memory.l1_cache_or_global_adapter, memory.nonblocking_memory_tag]
    required_local_state: [tag_array, data_array, miss_status_table, response_queue]
    required_input_interfaces: [memory_coalescer_to_l1_cache_bank, fabric_router_to_l1_cache_bank]
    required_output_interfaces: [l1_cache_bank_to_cache_response_router, l1_cache_bank_to_fabric_router]
    required_partial_sim_cases: [l1_cache_hit, l1_cache_miss, response_order_policy, write_policy]
    required_trace_fields: [l1_cache_id, request_tag, response_tag, byte_enable, queue_occupancy, final_eop]
    forbidden_hidden_state: [uncontracted_cache_policy, hidden_response_reorder]
    timing_checks: [tag_compare_fanout, no_combinational_ready_loop]
  l1_global_adapter_template:
    required_contract_paths: [memory.l1_cache_or_global_adapter, fabric.fabric_request_response]
    required_local_state: [request_buffer, response_buffer, source_context_table]
    required_input_interfaces: [memory_coalescer_to_l1_global_adapter, fabric_router_to_l1_global_adapter]
    required_output_interfaces: [l1_global_adapter_to_fabric_router, l1_global_adapter_to_cache_response_router]
    required_partial_sim_cases: [direct_global_forward, sm_id_route_preserve, response_restore_context, adapter_backpressure]
    required_trace_fields: [source_sm_id, request_tag, response_tag, lane_mask, fabric_route_id, queue_occupancy]
    forbidden_hidden_state: [implicit_source_sm_id, untraced_response_context]
    timing_checks: [adapter_queue_depth, no_combinational_ready_loop]
  l2_cache_slice_template:
    required_contract_paths: [memory.l2_cache_slice, interconnect.l2_slice_routing]
    required_local_state: [slice_tag_array, slice_data_array, request_queue, response_queue]
    required_input_interfaces: [fabric_router_to_l2_cache_slice, l2_mshr_to_l2_cache_slice]
    required_output_interfaces: [l2_cache_slice_to_l2_mshr, l2_cache_slice_to_cache_response_router, l2_cache_slice_to_dram_controller]
    required_partial_sim_cases: [l2_cache_hit, l2_cache_miss, l2_slice_route, fill_and_replay]
    required_trace_fields: [l2_slice_id, cache_bank_id, mshr_id, request_tag, response_tag, queue_occupancy]
    forbidden_hidden_state: [hidden_slice_hash, response_demux_without_source]
    timing_checks: [bank_arbitration_bound, no_combinational_ready_loop]
  l2_mshr_template:
    required_contract_paths: [memory.mshr_replay, memory.cache_response_routing]
    required_local_state: [mshr_table, replay_queue, fill_context_table, deadlock_guard_state]
    required_input_interfaces: [l2_cache_slice_to_l2_mshr, dram_controller_to_l2_mshr]
    required_output_interfaces: [l2_mshr_to_l2_cache_slice, l2_mshr_to_cache_response_router]
    required_partial_sim_cases: [mshr_allocate, mshr_replay, fill_completion_release, no_deadlock_watchdog]
    required_trace_fields: [mshr_id, source_sm_id, source_warp_id, request_tag, response_tag, queue_occupancy, final_eop]
    forbidden_hidden_state: [mshr_reuse_before_release, untraced_replay_context]
    timing_checks: [mshr_table_depth, no_combinational_ready_loop]
  cache_response_router_template:
    required_contract_paths: [memory.cache_response_routing, interconnect.response_demux]
    required_local_state: [response_demux_table, warp_lane_restore_table, scoreboard_release_queue]
