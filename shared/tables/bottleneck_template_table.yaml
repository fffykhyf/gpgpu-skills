version: v5
templates:
  memory_latency_template:
    required_nodes: [cycle_window, warp, memory_request, memory_response, rtl_pipeline_stage, contract_rule]
    dominant_stall_reasons: [memory_wait]
  shared_bank_conflict_template:
    required_nodes: [cycle_window, warp, bank_conflict, rtl_pipeline_stage, contract_rule]
    dominant_stall_reasons: [bank_conflict]
  scoreboard_dependency_template:
    required_nodes: [cycle_window, warp, scoreboard_dependency, register_writeback, contract_rule]
    dominant_stall_reasons: [scoreboard_dependency]
  scheduler_underutilization_template:
    required_nodes: [cycle_window, scheduler_state, scoreboard_dependency, rtl_pipeline_stage, contract_rule]
    dominant_stall_reasons: [no_ready_warp]
  barrier_synchronization_template:
    required_nodes: [cycle_window, barrier_state, warp, rtl_pipeline_stage, contract_rule]
    dominant_stall_reasons: [barrier_wait]
  branch_divergence_template:
    required_nodes: [cycle_window, branch_divergence, active_mask_event, contract_rule]
    dominant_stall_reasons: [divergence_reconvergence]
  pipeline_imbalance_template:
    required_nodes: [cycle_window, rtl_pipeline_stage, bottleneck_category, contract_rule]
    dominant_stall_reasons: [pipeline_busy]
  interface_backpressure_template:
    required_nodes: [cycle_window, interface_backpressure, rtl_pipeline_stage, contract_rule]
    dominant_stall_reasons: [interface_backpressure]
  toolchain_mismatch_template:
    required_nodes: [instruction, toolchain_artifact, contract_rule]
    dominant_stall_reasons: []
  runtime_launch_mismatch_template:
    required_nodes: [runtime_launch_event, toolchain_artifact, contract_rule]
    dominant_stall_reasons: [runtime_wait]
