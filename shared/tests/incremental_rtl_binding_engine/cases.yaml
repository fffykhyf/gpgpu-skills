cases:
  - case_id: incremental_rtl_detects_lsq_backpressure
    input_artifacts:
      - shared/examples/self_correcting_minimal_simt/expected_system_contract_ir.yaml
      - shared/examples/self_correcting_minimal_simt/expected_golden_contract_model.yaml
    expected_outputs:
      - INCREMENTAL_RTL_MAP
      - MODULE_INTERFACE_REPORT
      - RTL_PARTIAL_SIM_REPORT
    expected_failure_mode: null
    required_evidence:
      - interface_binding_ir
      - module_binding_template
      - memory_path_decomposition
      - local_trace_hash
      - interface_transaction_result
      - golden_slice_compare_result
      - module_specific_partial_sim_cases
      - local_timing_risk
      - no_combinational_ready_loop
    forbidden_outputs:
      - PERF_ATTRIBUTION_GRAPH
      - ARCH_REWRITE_PLAN

  - case_id: register_writeback_requires_byteen_and_eop
    input_artifacts:
      - shared/examples/self_correcting_minimal_simt/expected_incremental_rtl_map.yaml
    expected_outputs:
      - MODULE_INTERFACE_REPORT
      - RTL_PARTIAL_SIM_REPORT
    expected_failure_mode: WRITEBACK_BYTE_ENABLE_MISSING
    required_evidence:
      - byte_enable_or_byte_select
      - final_packet
      - scoreboard_release_event
      - SCOREBOARD_RELEASE_WITHOUT_FINAL_EOP

  - case_id: coalescer_response_restore_contract
    input_artifacts:
      - shared/examples/self_correcting_minimal_simt/expected_incremental_rtl_map.yaml
    expected_outputs:
      - MODULE_INTERFACE_REPORT
      - RTL_PARTIAL_SIM_REPORT
    expected_failure_mode: null
    required_evidence:
      - original_request_tag
      - per_lane_offset
      - restored_lane_mask
      - restored_lane_data
      - coalescer_response_restore
