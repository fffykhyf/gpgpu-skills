suite: front_end
version: v4
cases:
  - id: complete_spec_routes_to_reproduce
    input: fixtures/complete_spec_routes_to_reproduce.yaml
    expected_verdict: REJECT
  - id: vague_goal_routes_to_design_intent_lock
    input: fixtures/vague_goal_routes_to_design_intent_lock.yaml
    expected_verdict: REJECT
  - id: patch_request_routes_to_patch
    input: fixtures/patch_request_routes_to_patch.yaml
    expected_verdict: REJECT
  - id: trace_failure_routes_to_trace_debug
    input: fixtures/trace_failure_routes_to_trace_debug.yaml
    expected_verdict: REJECT
  - id: forbidden_architecture_field_rejected_in_intent
    input: fixtures/forbidden_architecture_field_rejected_in_intent.yaml
    expected_verdict: REJECT
common_reject_rules:
  - missing field must not be invented
  - hidden default must be rejected
  - forbidden inference must be rejected
  - conflicts must fail closed
