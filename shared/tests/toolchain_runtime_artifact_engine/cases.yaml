cases:
  - case_id: mmio_start_done_fault_smoke
    input_artifacts:
      - shared/examples/self_correcting_minimal_simt/expected_system_contract_ir.yaml
      - shared/examples/self_correcting_minimal_simt/expected_runtime_launch_ir.yaml
      - shared/references/rocket/mmio_runtime_debug.md
    expected_outputs:
      - MMIO_REGISTER_MAP_IR
      - DEBUG_COUNTER_CONTRACT
      - RUNTIME_LAUNCH_IR
      - TOOLCHAIN_SMOKE_REPORT
    expected_failure_mode: null
    required_evidence:
      - discovery block
      - launch block
      - status block
      - interrupt block
      - fault block
      - trace block
      - debug block
      - counter block
      - START/BUSY/DONE/FAULTED/ACK
      - second START while BUSY checked

  - case_id: derives_toolchain_runtime_artifacts_from_contract
    input_artifacts:
      - shared/examples/self_correcting_minimal_simt/expected_system_contract_ir.yaml
      - shared/examples/self_correcting_minimal_simt/expected_golden_contract_model.yaml
      - shared/examples/self_correcting_minimal_simt/input_kernel.asm
    expected_outputs:
      - TOOLCHAIN_ARTIFACT_IR
      - ASSEMBLY_IR
      - PROGRAM_IMAGE_IR
      - RUNTIME_LAUNCH_IR
      - LOADER_CONTRACT_IR
      - ASSEMBLER_BINDING_REPORT
      - TOOLCHAIN_SMOKE_REPORT
    expected_failure_mode: null
    required_evidence:
      - isa_table_hash_equivalence
      - assembler_encode_smoke
      - disassembler_roundtrip_smoke
      - program_image_layout_smoke
      - entry_symbol_resolve_smoke
      - runtime_argument_encoding_smoke
      - loader_contract_smoke
      - golden_image_execution_smoke
    forbidden_outputs:
      - INCREMENTAL_RTL_MAP
      - ARCH_REWRITE_PLAN

  - case_id: launch_abi_field_chain_complete
    input_artifacts:
      - shared/examples/self_correcting_minimal_simt/expected_system_contract_ir.yaml
      - shared/examples/self_correcting_minimal_simt/expected_program_image_ir.yaml
    expected_outputs:
      - RUNTIME_LAUNCH_IR
      - TOOLCHAIN_SMOKE_REPORT
    expected_failure_mode: null
    required_evidence:
      - public_launch_abi
      - arg_staging
      - control_plane_sequence
      - device_dispatch_view
      - completion_fault_observation
      - launch_trace_chain

  - case_id: rejects_unwired_launch_field
    input_artifacts:
      - shared/examples/self_correcting_minimal_simt/expected_runtime_launch_ir.yaml
    expected_outputs:
      - RUNTIME_LAUNCH_IR
    expected_failure_mode: UNWIRED_LAUNCH_ABI_FIELD
    required_evidence:
      - public_launch_abi
      - LAUNCH_FIELD_TRACE_BREAK
