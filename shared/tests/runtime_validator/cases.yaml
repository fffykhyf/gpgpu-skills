suite: runtime_validator
version: v4
cases:
  - id: valid_kernel_launch_pass
    input: fixtures/valid_kernel_launch_pass.yaml
    expected_verdict: PASS
  - id: software_stack_contract_pass
    input: fixtures/software_stack_contract_pass.yaml
    expected_verdict: PASS
  - id: program_image_contract_pass
    input: fixtures/program_image_contract_pass.yaml
    expected_verdict: PASS
  - id: invalid_argument_layout_reject
    input: fixtures/invalid_argument_layout_reject.yaml
    expected_verdict: REJECT
  - id: grid_dim_mismatch_reject
    input: fixtures/grid_dim_mismatch_reject.yaml
    expected_verdict: REJECT
  - id: missing_completion_path_reject
    input: fixtures/missing_completion_path_reject.yaml
    expected_verdict: REJECT
  - id: app_compile_fail_reject
    input: fixtures/app_compile_fail_reject.yaml
    expected_verdict: REJECT
  - id: fault_reporting_contract_pass
    input: fixtures/fault_reporting_contract_pass.yaml
    expected_verdict: PASS
common_reject_rules:
  - missing field must not be invented
  - hidden default must be rejected
  - forbidden inference must be rejected
  - conflicts must fail closed
