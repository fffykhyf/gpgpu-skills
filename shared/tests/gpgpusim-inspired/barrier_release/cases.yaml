cases:
  - case_id: cta_barrier_releases_after_all_expected_warps
    input_program: "bar.cta; add r1, r1, 1"
    expected_golden_behavior: no warp executes post-barrier instruction until all participants arrive
    expected_trace_fields: [cta_id, expected_participant_count, arrival_mask, release_condition, waiting_warp_list, release_event]
    expected_counter_changes: [barrier_wait_increments]
    expected_non_issue_or_stall_reason: barrier_wait
    expected_outputs:
      barrier_state: release_event
    required_evidence:
      - arrival_mask
      - release_condition

