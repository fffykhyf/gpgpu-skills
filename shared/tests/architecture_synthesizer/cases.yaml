suite: architecture_synthesizer
version: v4
cases:
  - id: minimal_simt_candidate_pass
    input: fixtures/minimal_simt_candidate_pass.yaml
    expected_verdict: PASS
  - id: multi_warp_single_sm_candidate_pass
    input: fixtures/multi_warp_single_sm_candidate_pass.yaml
    expected_verdict: PASS
  - id: minimal_vertical_slice_candidate_pass
    input: fixtures/minimal_vertical_slice_candidate_pass.yaml
    expected_verdict: PASS
  - id: unsupported_feature_reject
    input: fixtures/unsupported_feature_reject.yaml
    expected_verdict: REJECT
  - id: hard_constraint_fail_reject
    input: fixtures/hard_constraint_fail_reject.yaml
    expected_verdict: REJECT
  - id: candidate_not_spec_ir
    input: fixtures/candidate_not_spec_ir.yaml
    expected_verdict: REJECT
common_reject_rules:
  - missing field must not be invented
  - hidden default must be rejected
  - forbidden inference must be rejected
  - conflicts must fail closed
