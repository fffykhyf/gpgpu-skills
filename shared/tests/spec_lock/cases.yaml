suite: spec_lock
version: v4
cases:
  - id: complete_spec_pass
    input: fixtures/complete_spec_pass.yaml
    expected_verdict: PASS
  - id: missing_warp_size_reject
    input: fixtures/missing_warp_size_reject.yaml
    expected_verdict: REJECT
  - id: hidden_default_reject
    input: fixtures/hidden_default_reject.yaml
    expected_verdict: REJECT
  - id: unknown_enum_reject
    input: fixtures/unknown_enum_reject.yaml
    expected_verdict: REJECT
  - id: forbidden_provenance_reject
    input: fixtures/forbidden_provenance_reject.yaml
    expected_verdict: REJECT
  - id: conflicting_spec_field_reject
    input: fixtures/conflicting_spec_field_reject.yaml
    expected_verdict: REJECT
  - id: canonical_hash_stable
    input: fixtures/canonical_hash_stable.yaml
    expected_verdict: PASS
common_reject_rules:
  - missing field must not be invented
  - hidden default must be rejected
  - forbidden inference must be rejected
  - conflicts must fail closed
