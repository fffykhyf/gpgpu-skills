cases:
  - case_id: negotiated_interface_width_adapter
    input:
      capability_profile: full_memory_sync_system
      client_width_bits: 256
      manager_width_bits: 128
      fabric_events: [negotiated_edge, width_mismatch]
    expected_outputs:
      - NEGOTIATED_INTERFACE_IR
      - ADAPTER_CONTRACT
      - PROTOCOL_MONITOR_CONTRACT
      - contract_fragment_ir: interconnect.fabric_request_response
    required_evidence:
      - negotiated edge
      - width adapter
      - derived data_bits
      - source-id range
      - fragment adapter decision
      - atomic adapter decision
      - protocol bridge adapter decision
      - monitor derived from negotiated edge

  - case_id: l2_slice_route_preserves_source_sm
    input:
      capability_profile: full_memory_sync_system
      fabric_events: [l2_slice_route]
    expected_outputs:
      contract_fragment_ir: interconnect.fabric_request_response
      root_cause_on_failure: L2_SLICE_ROUTE_MISMATCH
    required_evidence:
      - source_sm_id
      - request_tag
      - target_l2_slice_id
      - route_id
  - case_id: response_demux_restores_warp_lane_shape
    input:
      fabric_events: [response_demux]
    expected_outputs:
      root_cause_on_failure: RESPONSE_DEMUX_MISMATCH
    required_evidence:
      - source_request_tag
      - target_warp_id
      - target_lane_mask
      - final_eop
