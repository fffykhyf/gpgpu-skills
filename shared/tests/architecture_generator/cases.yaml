cases:
  - case_id: rocket_style_config_resolution
    input_artifacts:
      - shared/references/source_summaries/rocket.md
      - shared/references/source_summaries/rocket.md
    expected_outputs:
      - CONFIG_STACK_IR
      - RESOLVED_CONFIG_IR
      - SYSTEM_COMPOSITION_IR
      - ARCH_IR
    expected_failure_mode: null
    required_evidence:
      - config owner
      - override order
      - derived field
      - invariant
      - consumer
      - collateral
      - ARCH_IR generated after RESOLVED_CONFIG_IR
      - ARCH_IR generated after SYSTEM_COMPOSITION_IR
    forbidden_outputs:
      - GOLDEN_CONTRACT_MODEL
      - INCREMENTAL_RTL_MAP

  - case_id: architecture_generator_memory_pressure_prefilter
    input:
      artifacts:
        - path: shared/examples/minimal_simt/input_request.md
          role: user_spec
    expected:
      outputs:
        - artifact_name: DESIGN_INTENT_IR
          schema: design_intent_ir
          path: shared/examples/minimal_simt/ai/expected_design_intent_ir.yaml
        - artifact_name: ARCH_IR
          schema: arch_ir
          path: shared/examples/minimal_simt/ai/expected_arch_ir.yaml
        - artifact_name: MICRO_CONSTRAINT_ESTIMATE_IR
          schema: micro_constraint_estimate_ir
          path: shared/examples/minimal_simt/ai/expected_micro_constraint_estimate.yaml
      verdict: ACCEPT
      failure_mode: null
    required_gates:
      - schema_valid
      - contract_paths_resolvable
      - canonical_hash_present
    required_evidence:
      - area_estimate
      - deterministic_area_rule
      - memory_pressure_estimate
      - warp_occupancy_bound
      - preset_rule_TOOLCHAIN_RUNTIME_VERTICAL_SLICE
      - arch_graph_node_required_contract_paths
    forbidden_outputs:
      - SYSTEM_CONTRACT_IR
      - GOLDEN_CONTRACT_MODEL
      - ARCH_REWRITE_PLAN
    patch_route:
      expected: none
