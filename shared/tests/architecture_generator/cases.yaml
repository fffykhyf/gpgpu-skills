cases:
  - case_id: rocket_style_config_resolution
    input_artifacts:
      - shared/references/rocket/config_fragment_lessons.md
      - shared/references/rocket/soc_composition.md
    expected_outputs:
      - CONFIG_STACK_IR
      - RESOLVED_CONFIG_IR
      - SYSTEM_COMPOSITION_IR
      - ARCH_IR
    expected_failure_mode: null
    required_evidence:
      - config owner
      - override order
      - derived field
      - invariant
      - consumer
      - collateral
      - ARCH_IR generated after RESOLVED_CONFIG_IR
      - ARCH_IR generated after SYSTEM_COMPOSITION_IR
    forbidden_outputs:
      - GOLDEN_CONTRACT_MODEL
      - INCREMENTAL_RTL_MAP

  - case_id: architecture_generator_memory_pressure_prefilter
    input_artifacts:
      - shared/examples/self_correcting_minimal_simt/input_request.md
    expected_outputs:
      - DESIGN_INTENT_IR
      - ARCH_IR
      - MICRO_CONSTRAINT_ESTIMATE_IR
    expected_failure_mode: null
    required_evidence:
      - area_estimate
      - deterministic_area_rule
      - memory_pressure_estimate
      - warp_occupancy_bound
      - preset_rule_MINIMAL_VERTICAL_SLICE_GPGPU
      - arch_graph_node_required_contract_paths
    forbidden_outputs:
      - SYSTEM_CONTRACT_IR
      - GOLDEN_CONTRACT_MODEL
      - ARCH_REWRITE_PLAN
