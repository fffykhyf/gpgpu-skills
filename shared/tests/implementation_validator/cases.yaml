  - id: branch_active_mask_trace_pass
    input: fixtures/branch_active_mask_trace_pass.yaml
    expected_verdict: PASS
  - id: scoreboard_stall_trace_pass
    input: fixtures/scoreboard_stall_trace_pass.yaml
    expected_verdict: PASS
  - id: vertical_slice_smoke_pass
    input: fixtures/vertical_slice_smoke_pass.yaml
    expected_verdict: PASS
  - id: memory_dump_compare_pass
    input: fixtures/memory_dump_compare_pass.yaml
    expected_verdict: PASS
