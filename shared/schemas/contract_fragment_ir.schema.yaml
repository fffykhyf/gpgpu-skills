schema: contract_fragment_ir
version: compact-v1
type: object
required: [fragment_id, owner_skill, fragment_type, contract_paths, provenance]
properties:
  fragment_id:
    type: string
  owner_skill:
    type: string
  fragment_type:
    enum:
      - simt_core
      - warp_scheduler
      - scoreboard
      - shared_memory
      - memory_path
      - coalescer
      - l1_global_adapter
      - l2_cache_slice
      - dram_controller
      - interconnect
      - noc_routing
      - fabric_backpressure
      - atomic
      - fence
      - barrier
      - memory_consistency
  contract_paths:
    type: array
  provenance:
    type: object
  memory_path:
    type: object
  interconnect:
    type: object
  atomic_sync:
    type: object
  validation_hooks:
    type: array
  rtl_binding_hooks:
    type: array
  golden_semantics_hooks:
    type: array
