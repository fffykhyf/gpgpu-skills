schema: system_contract_ir
version: v5
type: object
required:
  - system_id
  - capability_profile
  - arch_ir_hash
  - architecture_model
  - isa_model
  - execution_model
  - state_model
  - memory_model
  - launch_model
  - interface_semantics_model
  - config_contract
  - source_of_truth_map
  - provenance
  - canonical_hash
properties:
  system_id: string
  capability_profile: string
  arch_ir_hash: string
  contract_fragments: list
  architecture_model: map
  isa_model:
    type: object
    required:
      - opcodes
      - instruction_encodings
      - decode_classes
      - operand_fields
      - assembly_syntax
      - pseudo_instruction_rules
      - unsupported_instruction_behavior
      - control_opcode_model
      - isa_model_hash
    properties:
      opcodes: map
      instruction_encodings:
        type: object
        required:
          - width_bits
          - endian
          - field_layouts
          - immediate_layouts
          - branch_offset_rule
          - alignment_rule
        properties:
          width_bits: integer
          endian: string
          field_layouts: map
          immediate_layouts: map
          branch_offset_rule: map
          alignment_rule: map
      decode_classes: map
      operand_fields: map
      assembly_syntax:
        type: object
        required:
          - register_naming
          - immediate_formats
          - label_syntax
          - section_syntax
          - comment_syntax
        properties:
          register_naming: map
          immediate_formats: map
          label_syntax: map
          section_syntax: map
          comment_syntax: string
      pseudo_instruction_rules:
        type: object
        required:
          - enabled
          - expansion_rules
        properties:
          enabled: bool
          expansion_rules: map
      unsupported_instruction_behavior: string
      control_opcode_model:
        type: object
        required:
          - control_ops
          - variant_bits
          - overloaded_fields
          - derived_views
        properties:
          control_ops:
            type: object
            example:
              TMC: {semantic: write_exec_mask}
              WSPAWN: {semantic: spawn_warps}
              SPLIT: {semantic: divergence_push_or_select}
              JOIN: {semantic: reconvergence_pop_or_else_path}
              BAR: {semantic: barrier_arrive_or_wait}
              WSYNC: {semantic: drain_prior_warp_work}
          variant_bits: map
          overloaded_fields: list
          derived_views:
            type: object
            required:
              - assembler
              - disassembler
              - rtl_decode
              - simulator_decode
              - docs
            properties:
              assembler: string
              disassembler: string
              rtl_decode: string
              simulator_decode: string
              docs: string
      isa_model_hash: string
  execution_model: map
  state_model:
    type: object
    required:
      - pc_table
      - exec_mask_table
      - warp_state
      - scheduler_state
      - register_file_state
      - scoreboard_state
      - simt_stack_state
      - pipeline_visible_state
      - memory_stall_state
      - csr_state
      - launch_state
      - completion_fault_state
    properties:
      pc_table: map
      exec_mask_table: map
      warp_state: map
      scheduler_state: map
      register_file_state: map
      scoreboard_state: map
      simt_stack_state: map
      pipeline_visible_state: map
      memory_stall_state: map
      csr_state: map
      launch_state: map
      completion_fault_state: map
  memory_model:
    type: object
    required:
      - address_spaces
      - coalescing
      - ordering
      - fence
      - atomic
      - request_lifecycle
      - fault_behavior
    properties:
      address_spaces: map
      coalescing: map
      ordering: map
      fence: map
      atomic: map
      request_lifecycle: map
      fault_behavior: map
  launch_model:
    type: object
    required:
      - abi
      - grid_block_thread_mapping
      - kernel_entry
      - program_image_format
      - argument_buffer_layout
      - loader_contract
      - completion_fault_observation
    properties:
      abi: string
      grid_block_thread_mapping: string
      kernel_entry: string
      program_image_format:
        type: object
        required:
          - text_segment_rule
          - data_segment_rule
          - symbol_table_rule
          - relocation_rule
          - entry_symbol_rule
          - metadata_hash_rule
        properties:
          text_segment_rule: map
          data_segment_rule: map
          symbol_table_rule: map
          relocation_rule: map
          entry_symbol_rule: map
          metadata_hash_rule: map
      argument_buffer_layout:
        type: object
        required:
          - endian
          - alignment
          - scalar_arg_rule
          - pointer_arg_rule
        properties:
          endian: string
          alignment: integer
          scalar_arg_rule: map
          pointer_arg_rule: map
      loader_contract:
        type: object
        required:
          - imem_load_rule
          - dmem_load_rule
          - entry_pc_rule
          - reset_visibility
        properties:
          imem_load_rule: map
          dmem_load_rule: map
          entry_pc_rule: map
          reset_visibility: map
      completion_fault_observation: string
  interface_semantics_model:
    type: object
    required:
      - request_acceptance
      - payload_stability
      - tag_uniqueness
      - response_ordering
      - fault_response
    properties:
      request_acceptance: map
      payload_stability: map
      tag_uniqueness: map
      response_ordering: map
      fault_response: map
  config_contract: map
  source_of_truth_map: map
  provenance: map
  canonical_hash: string
