schema: pass_evidence_report_ir
version: v5
type: object
required:
  - verdict
  - evidence_completeness
  - architectural_state_comparison
  - coverage_summary_ref
  - performance_metric_ref
  - regression_fingerprint_ref
  - warnings
properties:
  verdict: enum
  evidence_completeness: map
  architectural_state_comparison: map
  coverage_summary_ref: string
  performance_metric_ref: string
  regression_fingerprint_ref: string
  warnings: list
verdicts:
  - CORRECTNESS_PASS_STRONG
  - CORRECTNESS_PASS_WEAK
  - PASS_WITH_INSUFFICIENT_EVIDENCE
  - PASS_WITH_PERFORMANCE_WARNING
  - PASS_WITH_TRACE_DIVERGENCE_WARNING
