schema: arch_ir
version: v5
type: object
required:
  - candidate_id
  - design_intent_ref
  - capability_profile
  - graph_nodes
  - graph_edges
  - constraint_proof
  - verification_profile
  - provenance
  - rejected_alternatives
  - unresolved_risks
properties:
  candidate_id: string
  design_intent_ref: string
  capability_profile: string
  graph_nodes:
    type: list
    item_schema: ARCH_GRAPH_NODE
  graph_edges:
    type: list
    item_schema: ARCH_GRAPH_EDGE
  constraint_proof: map
  verification_profile:
    type: object
    required:
      - simulator_required
      - rtl_sim_required
      - module_unit_required
      - runtime_launch_required
      - synthesis_required_if_backend_fpga
      - ppa_required_if_performance_target
    properties:
      simulator_required: bool
      rtl_sim_required: bool
      module_unit_required: bool
      runtime_launch_required: bool
      synthesis_required_if_backend_fpga: bool
      ppa_required_if_performance_target: bool
  provenance: map
  rejected_alternatives: list
  unresolved_risks: list
definitions:
  ARCH_GRAPH_NODE:
    type: object
    required:
      - node_id
      - node_type
      - owned_state
      - input_ports
      - output_ports
      - required_contract_paths
      - scaling_parameters
      - state_owner
      - implementation_policy
      - verification_hooks
      - backend_matrix
    properties:
      node_id: string
      node_type: string
      owned_state: list
      input_ports: list
      output_ports: list
      required_contract_paths: list
      scaling_parameters: list
      state_owner: list
      implementation_policy: map
      verification_hooks: map
      backend_matrix: map
    rule: graph_nodes must be structured maps, not bare string module names.
  ARCH_GRAPH_EDGE:
    type: object
    required:
      - from
      - to
    properties:
      from: string
      from_port: string
      to: string
      to_port: string
      edge_type: string
