schema: regression_tracking_report_ir
version: v5
type: object
required:
  - failure_signature
  - previous_verdict
  - repaired_by
  - reappeared_in_run
  - blocked_module
  - next_required_evidence
  - same_patch_attempt_count
  - last_patch_type
  - last_owner_module
  - worsened_gates
  - rollback_required
  - escalation_policy
properties:
  failure_signature: string
  previous_verdict: string
  repaired_by: string
  reappeared_in_run: boolean
  blocked_module: string
  next_required_evidence: list
  same_patch_attempt_count: integer
  last_patch_type: string
  last_owner_module: string
  worsened_gates: list
  rollback_required: boolean
  escalation_policy: map
