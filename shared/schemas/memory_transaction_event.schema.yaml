schema: memory_transaction_event
version: v5-xiangshan
owner_skill: gpgpu-memory
type: object
required:
  - transaction_id
  - cycle
  - event_type
  - sm_id
  - warp_id
  - lane_mask
  - address
  - byte_enable
  - request_tag
properties:
  transaction_id: string
  cycle: integer
  event_type: enum
  sm_id: integer
  warp_id: integer
  lane_mask: string
  address: string
  byte_enable: string
  request_tag: string
  response_tag: string
  data_hash: string
event_types:
  - load
  - store
  - atomic
  - coalesced_request
  - cache_refill
  - mshr_replay

