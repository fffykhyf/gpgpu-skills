schema: cache_request_status
version: v6-gpgpusim
owner_skill: gpgpu-memory
producer_skill:
  - gpgpu-rtl
  - gpgpu-simppa
consumer_skill:
  - gpgpu-memory
  - gpgpu-simppa
  - gpgpu-loop
required:
  - request_id
  - cache_level
  - status
  - reservation_fail_reason
  - mshr_id
  - owner_skill
  - validation_rule
properties:
  request_id: string
  cache_level: enum
  status: enum
  reservation_fail_reason: enum
  mshr_id: string
  set_index: integer
  way: integer
status_enum:
  - HIT
  - HIT_RESERVED
  - MISS
  - SECTOR_MISS
  - MSHR_HIT
  - RESERVATION_FAIL
reservation_fail_reason_enum:
  - NONE
  - LINE_ALLOC_FAIL
  - MISS_QUEUE_FULL
  - MSHR_ENTRY_FAIL
  - MSHR_MERGE_ENTRY_FAIL
  - MSHR_RW_PENDING
validation_rules:
  - RESERVATION_FAIL requires a non-NONE reservation_fail_reason.
  - MISS and RESERVATION_FAIL must remain separate counters.
example:
  request_id: wmt0
  cache_level: L1D
  status: RESERVATION_FAIL
  reservation_fail_reason: MSHR_ENTRY_FAIL
  mshr_id: m17
  owner_skill: gpgpu-memory
  validation_rule: cache_miss_not_reservation_fail

