  yosys_version: string
  frontend_mode: enum
  filelist: list
  include_dirs: list
  defines: map
  chparams: map
  top_module: string
  profile_id: string
  build_dir: string
  report_dir: string
  log_dir: string
  script_path: string
  claim_scope: list
