schema: yosys_flow_ir
version: v1
type: object
required:
  - flow_id
  - yosys_version
  - frontend_mode
  - filelist
  - include_dirs
  - defines
  - chparams
  - top_module
  - profile_id
  - build_dir
  - report_dir
  - log_dir
  - script_path
  - claim_scope
properties:
