schema: store_commit_event
version: v5-xiangshan
owner_skill: gpgpu-golden
type: object
required:
  - event_id
  - cycle_or_step
  - sm_id
  - warp_id
  - lane_mask
  - address
  - byte_enable
  - data_hash
  - commit_sequence
properties:
  event_id: string
  cycle_or_step: integer
  sm_id: integer
  warp_id: integer
  lane_mask: string
  address: string
  byte_enable: string
  data_hash: string
  commit_sequence: integer
  memory_scope: string
  fault_status: map

