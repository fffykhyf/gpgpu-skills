schema: OUTPUT_MODE_IR
version: v1
type: object
required:
  - output_mode
  - human_language
  - ai_artifact_language
  - full_ir_expansion
  - debug_expansion
properties:
  output_mode:
    type: enum
    values:
      - FAST_ITERATION
      - CONTRACT_FREEZE
      - DEBUG_REGRESSION
  human_language:
    type: enum
    values:
      - zh-CN
  ai_artifact_language:
    type: enum
    values:
      - en-US
  full_ir_expansion:
    type: boolean
  debug_expansion:
    type: boolean
failure_rules:
  unsupported_output_mode: UNSUPPORTED_OUTPUT_MODE
  wrong_human_language: HUMAN_REPORT_LANGUAGE_MISMATCH
  wrong_ai_language: AI_ARTIFACT_LANGUAGE_MISMATCH
