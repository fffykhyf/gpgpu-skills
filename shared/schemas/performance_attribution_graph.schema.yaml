schema: performance_attribution_graph
version: v6-gpgpusim
owner_skill: gpgpu-simppa
producer_skill:
  - gpgpu-simppa
consumer_skill:
  - gpgpu-loop
required:
  - graph_id
  - attribution_order
  - symptom_counter
  - exclusion_counter
  - queue_or_stage_owner
  - possible_fix_target
  - confidence
  - nodes
  - edges
  - owner_skill
  - validation_rule
properties:
  graph_id: string
  attribution_order: list
  symptom_counter: list
  exclusion_counter: list
  queue_or_stage_owner: string
  possible_fix_target: string
  confidence: enum
  nodes: list
  edges: list
  power_derivative_evidence: list
validation_rules:
  - Root cause requires symptom counter, exclusion counter, owner, fix target, and confidence.
  - Power/energy nodes may only support activity-derived evidence.
example:
  graph_id: perf0
  attribution_order: [launch_occupancy, scheduler_issue, l1_cache_status, mshr, icnt_request_path]
  symptom_counter: [cache_reservation_fail, MSHR_ENTRY_FAIL]
  exclusion_counter: [coalesced_transaction_count_normal, icnt_has_buffer_fail_low]
  queue_or_stage_owner: L1_MSHR
  possible_fix_target: increase_mshr_entries_or_reduce_outstanding_memory_ops
  confidence: high
  nodes: [cache_reservation_fail, mshr_entry_fail]
  edges: [{from: mshr_entry_fail, to: cache_reservation_fail, type: caused_by}]
  owner_skill: gpgpu-simppa
  validation_rule: root_cause_evidence_rule

