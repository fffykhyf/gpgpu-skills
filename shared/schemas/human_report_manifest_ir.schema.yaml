schema: HUMAN_REPORT_MANIFEST_IR
version: v1
type: object
required:
  - report_id
  - report_name
  - language
  - report_type
  - source_ai_artifacts
  - required_human_decisions
  - blocked_items
  - next_actions
properties:
  report_id: string
  report_name: string
  language:
    const: zh-CN
  report_type:
    type: enum
    values:
      - DESIGN_BRIEF
      - ARCHITECTURE_DECISION
      - CONTRACT_FREEZE_SUMMARY
      - IMPLEMENTATION_DASHBOARD
      - VALIDATION_DASHBOARD
      - DEBUG_SUMMARY
      - PATCH_CARD
      - REGRESSION_SUMMARY
  source_ai_artifacts: list[string]
  required_human_decisions: list[string]
  blocked_items: list[string]
  next_actions: list[string]
failure_rules:
  unsupported_report_type: HUMAN_REPORT_TYPE_UNSUPPORTED
  report_not_chinese: HUMAN_REPORT_LANGUAGE_MISMATCH
  report_missing_sources: HUMAN_REPORT_SOURCE_MISSING
