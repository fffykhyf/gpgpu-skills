schema: golden_sidecar_state
version: v5-xiangshan
owner_skill: gpgpu-golden
type: object
required:
  - sidecar_id
  - scoreboard_state
  - outstanding_memory_state
  - barrier_phase_state
  - atomic_pending_state
  - debug_event_query
properties:
  sidecar_id: string
  scoreboard_state: map
  outstanding_memory_state: map
  barrier_phase_state: map
  atomic_pending_state: map
  interrupt_or_fault_injection: map
  debug_event_query: map
validation_rules:
  - sidecar state may synchronize diff and debug but must not define ISA-visible semantics.

