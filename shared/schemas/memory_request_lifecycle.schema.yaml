schema: memory_request_lifecycle
version: v6-gpgpusim
owner_skill: gpgpu-memory
producer_skill:
  - gpgpu-memory
  - gpgpu-interconnect
  - gpgpu-rtl
consumer_skill:
  - gpgpu-simppa
  - gpgpu-loop
required:
  - request_id
  - created
  - coalesced
  - sent_to_l1
  - l1_hit_or_miss
  - mshr_allocated
  - sent_to_icnt
  - arrived_l2_partition
  - l2_hit_or_miss
  - sent_to_dram_queue
  - issued_to_dram
  - returned_to_l2
  - returned_to_icnt
  - returned_to_shader
  - scoreboard_released
  - owner_skill
  - validation_rule
properties:
  request_id: string
  created: map
  coalesced: map
  sent_to_l1: map
  l1_hit_or_miss: map
  mshr_allocated: map
  sent_to_icnt: map
  arrived_l2_partition: map
  l2_hit_or_miss: map
  sent_to_dram_queue: map
  issued_to_dram: map
  returned_to_l2: map
  returned_to_icnt: map
  returned_to_shader: map
  scoreboard_released: map
validation_rules:
  - Missing lifecycle stage requires an explicit bypass or disabled-feature reason.
  - Queue-boundary attribution must name the stage where wait_cycles is maximal.
example:
  request_id: wmt0
  created: {cycle: 10}
  coalesced: {cycle: 11}
  sent_to_l1: {cycle: 12}
  l1_hit_or_miss: {cycle: 13, status: MISS}
  mshr_allocated: {cycle: 14, mshr_id: m0}
  sent_to_icnt: {cycle: 15}
  arrived_l2_partition: {cycle: 25}
  l2_hit_or_miss: {cycle: 26, status: MISS}
  sent_to_dram_queue: {cycle: 27}
  issued_to_dram: {cycle: 60}
  returned_to_l2: {cycle: 120}
  returned_to_icnt: {cycle: 121}
  returned_to_shader: {cycle: 140}
  scoreboard_released: {cycle: 141}
  owner_skill: gpgpu-memory
  validation_rule: memory_lifecycle_complete

