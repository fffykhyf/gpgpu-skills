schema: regression_fingerprint_ir
version: v5
type: object
required:
  - contract_hash
  - golden_model_hash
  - rtl_hash
  - input_memory_hash
  - final_memory_hash
  - trace_summary_hash
  - performance_metric_hash
  - coverage_hash
properties:
  contract_hash: {type: string, hash_format: sha256_canonical_json}
  golden_model_hash: {type: string, hash_format: sha256_canonical_json}
  rtl_hash: {type: string, hash_format: sha256_canonical_json}
  toolchain_artifact_hash: {type: string, hash_format: sha256_canonical_json}
  program_image_hash: {type: string, hash_format: sha256_canonical_json}
  runtime_launch_hash: {type: string, hash_format: sha256_canonical_json}
  loader_contract_hash: {type: string, hash_format: sha256_canonical_json}
  input_memory_hash: {type: string, hash_format: sha256_canonical_json}
  final_memory_hash: {type: string, hash_format: sha256_canonical_json}
  trace_summary_hash: {type: string, hash_format: sha256_canonical_json}
  performance_metric_hash: {type: string, hash_format: sha256_canonical_json}
  coverage_hash: {type: string, hash_format: sha256_canonical_json}
