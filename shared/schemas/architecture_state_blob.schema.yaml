schema: architecture_state_blob
version: v5-xiangshan
owner_skill: gpgpu-golden
type: object
required:
  - blob_id
  - pc_state
  - warp_state
  - register_file_state
  - predicate_state
  - memory_visible_state
  - control_state
properties:
  blob_id: string
  pc_state: map
  warp_state: map
  register_file_state: map
  predicate_state: map
  memory_visible_state: map
  control_state: map
  schema_version: string
validation_rules:
  - architecture-visible state is diff-visible.
  - sidecar-only synchronization state must not be mixed into this blob.

