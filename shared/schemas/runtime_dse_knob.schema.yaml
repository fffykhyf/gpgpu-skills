schema: runtime_dse_knob
version: v5-xiangshan
owner_skill: gpgpu-arch
type: object
required:
  - name
  - class
  - default
  - value
  - bounds
  - metric
  - trace_tables
  - structural_mutation_allowed
properties:
  name: string
  class: enum
  default: string
  value: string
  bounds: map
  metric: string
  trace_tables: list
  contamination_risk: string
  structural_mutation_allowed: boolean
validation_rules:
  - structural_mutation_allowed must be false for runtime knobs.

