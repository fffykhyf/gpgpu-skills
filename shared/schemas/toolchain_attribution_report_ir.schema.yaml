schema: toolchain_attribution_report_ir
version: v5
type: object
required:
  - verdict
  - checked_chain
  - related_contract_paths
  - related_artifacts
properties:
  verdict: enum
  checked_chain: map
  failure_point: enum
  related_contract_paths: list
  related_artifacts: list
  evidence_hashes: list
verdicts:
  - TOOLCHAIN_PASS
  - TOOLCHAIN_ROOT_CAUSE_FOUND
  - TOOLCHAIN_TRACE_INSUFFICIENT
failure_points:
  - ASM_PARSE
  - ASM_ENCODE
  - DISASM_DECODE
  - ROUNDTRIP
  - PROGRAM_IMAGE_LAYOUT
  - ENTRY_SYMBOL_RESOLUTION
  - LOADER_INIT
  - RUNTIME_ARG_ENCODING
  - RTL_FETCH
  - RTL_DECODE
