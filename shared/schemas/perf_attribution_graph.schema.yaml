schema: perf_attribution_graph
version: v5
type: object
required:
  - graph_id
  - graph_mode
  - trace_window
  - nodes
  - edges
  - contract_path_index
  - rtl_module_path_index
  - toolchain_artifact_path_index
  - bottleneck_summary
  - evidence_hashes
properties:
  graph_id: string
  graph_mode: enum
  trace_window: map
  nodes: list
  edges: list
  contract_path_index: map
  rtl_module_path_index: map
  toolchain_artifact_path_index: map
  bottleneck_summary: map
  evidence_hashes: list
  first_divergence_ref: string
  performance_metric_ref: string
graph_modes:
  - CORRECTNESS_FAILURE_GRAPH
  - PERFORMANCE_BOTTLENECK_GRAPH
  - TOOLCHAIN_ATTRIBUTION_GRAPH
