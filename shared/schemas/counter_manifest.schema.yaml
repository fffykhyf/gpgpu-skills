schema: counter_manifest
version: v6-gpgpusim
owner_skill: gpgpu-simppa
producer_skill:
  - gpgpu-simppa
  - gpgpu-rtl
consumer_skill:
  - gpgpu-loop
required:
  - counter_name
  - producer_module
  - producer_event
  - meaning
  - unit
  - sample_window
  - status
  - used_by
  - stable_or_debug
  - owner_skill
  - validation_rule
properties:
  counter_name: string
  producer_module: string
  producer_event: string
  meaning: string
  unit: string
  sample_window: string
  status: enum
  used_by: list
  stable_or_debug: enum
status_enum:
  - producer-backed
  - defined-only
  - parser-only
validation_rules:
  - Stable regression gates require producer-backed status.
  - parser-only counters cannot be used as sole root-cause evidence.
example:
  counter_name: cache_reservation_fail
  producer_module: l1d_cache
  producer_event: reservation_fail
  meaning: request could not allocate cache/MSHR resource
  unit: events
  sample_window: kernel
  status: producer-backed
  used_by: [gpgpu-simppa, gpgpu-loop]
  stable_or_debug: stable
  owner_skill: gpgpu-simppa
  validation_rule: counter_requires_producer

