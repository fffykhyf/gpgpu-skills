schema: debug_counter_contract
version: v5
type: object
required:
  - discovery_ref
  - debug_block
  - counter_block
  - trace_block
  - access_semantics
  - producer_bindings
  - canonical_hash
properties:
  discovery_ref: string
  debug_block:
    type: object
    required: [present_if, control, status, fault, memory_window]
    properties:
      present_if: string
      control: map
      status: map
      fault: map
      memory_window: map
  counter_block:
    type: object
    required: [present_if, control, status, data]
    properties:
      present_if: string
      control: map
      status: map
      data: map
  trace_block:
    type: object
    required: [present_if, enable, target, sink]
    properties:
      present_if: string
      enable: map
      target: map
      sink: map
  access_semantics: list
  producer_bindings:
    type: list
    item_schema: COUNTER_PRODUCER_BINDING
  canonical_hash: string
definitions:
  COUNTER_PRODUCER_BINDING:
    type: object
    required: [counter_name, producer_module, producer_event, unit, sample_window, consumer_skill]
    properties:
      counter_name: string
      producer_module: string
      producer_event: string
      unit: string
      sample_window: string
      consumer_skill: string
rules:
  - Counter data is read-only volatile data; counter control owns freeze, snapshot, and clear operations.
  - Debug control, debug status, debug fault, trace control, and memory windows are distinct blocks.
  - Every stable counter must have a producer binding before gpgpu-simppa may use it for root cause or regression gating.
failure_modes:
  - DEBUG_COUNTER_CONTRACT_MISSING
  - COUNTER_PRODUCER_MISSING
  - TRACE_SINK_UNDECLARED
  - DEBUG_STATUS_VOLATILE_MISSING
