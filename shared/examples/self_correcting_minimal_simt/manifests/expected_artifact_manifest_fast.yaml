run_id: self_correcting_minimal_simt_fast
output_mode: FAST_ITERATION
ai_artifacts:
  - artifact_name: DESIGN_INTENT_IR
    artifact_type: yaml
    path: shared/examples/self_correcting_minimal_simt/ai/expected_design_intent_ir.yaml
    language: en-US
    visibility: AI_REQUIRED
    content_hash: hash_design_intent_minimal_simt
    producer_skill: gpgpu-arch
    consumed_by: [gpgpu-golden, gpgpu-rtl]
  - artifact_name: ARCH_IR
    artifact_type: yaml
    path: shared/examples/self_correcting_minimal_simt/ai/expected_arch_ir.yaml
    language: en-US
    visibility: AI_REQUIRED
    content_hash: hash_arch_minimal_simt
    producer_skill: gpgpu-arch
    consumed_by: [gpgpu-golden, gpgpu-loop]
  - artifact_name: MICRO_CONSTRAINT_ESTIMATE_IR
    artifact_type: yaml
    path: shared/examples/self_correcting_minimal_simt/ai/expected_micro_constraint_estimate.yaml
    language: en-US
    visibility: AI_REQUIRED
    content_hash: hash_micro_constraint_minimal_simt
    producer_skill: gpgpu-arch
    consumed_by: [gpgpu-golden]
  - artifact_name: INCREMENTAL_RTL_MAP
    artifact_type: yaml
    path: shared/examples/self_correcting_minimal_simt/ai/expected_incremental_rtl_map.yaml
    language: en-US
    visibility: AI_REQUIRED
    content_hash: hash_incremental_rtl_map_minimal_simt
    producer_skill: gpgpu-rtl
    consumed_by: [gpgpu-simppa, gpgpu-loop]
  - artifact_name: PERFORMANCE_METRIC_IR
    artifact_type: yaml
    path: shared/examples/self_correcting_minimal_simt/ai/expected_performance_metric_ir.yaml
    language: en-US
    visibility: AI_REQUIRED
    content_hash: hash_performance_metric_minimal_simt
    producer_skill: gpgpu-simppa
    consumed_by: [gpgpu-loop]
  - artifact_name: CORRECTNESS_GATE_REPORT
    artifact_type: yaml
    path: shared/examples/self_correcting_minimal_simt/ai/expected_correctness_gate_report_ir.yaml
    language: en-US
    visibility: AI_REQUIRED
    content_hash: hash_correctness_gate_minimal_simt
    producer_skill: gpgpu-simppa
    consumed_by: [gpgpu-loop]
  - artifact_name: PASS_EVIDENCE_REPORT
    artifact_type: yaml
    path: shared/examples/self_correcting_minimal_simt/ai/expected_pass_evidence_report_ir.yaml
    language: en-US
    visibility: AI_REQUIRED
    content_hash: hash_pass_evidence_minimal_simt
    producer_skill: gpgpu-simppa
    consumed_by: [gpgpu-loop]
human_reports:
  - report_name: DESIGN_BRIEF
    path: shared/examples/self_correcting_minimal_simt/human/DESIGN_BRIEF.zh.md
    language: zh-CN
    visibility: HUMAN_REQUIRED
    source_artifacts: [DESIGN_INTENT_IR, ARCH_IR, MICRO_CONSTRAINT_ESTIMATE_IR]
  - report_name: ARCHITECTURE_DECISION
    path: shared/examples/self_correcting_minimal_simt/human/ARCHITECTURE_DECISION.zh.md
    language: zh-CN
    visibility: HUMAN_REQUIRED
    source_artifacts: [ARCH_IR, MICRO_CONSTRAINT_ESTIMATE_IR]
  - report_name: VALIDATION_DASHBOARD
    path: shared/examples/self_correcting_minimal_simt/human/VALIDATION_DASHBOARD.zh.md
    language: zh-CN
    visibility: HUMAN_REQUIRED
    source_artifacts: [CORRECTNESS_GATE_REPORT, PASS_EVIDENCE_REPORT, PERFORMANCE_METRIC_IR]
