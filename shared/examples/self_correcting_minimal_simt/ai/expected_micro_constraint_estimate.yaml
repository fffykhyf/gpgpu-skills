area_estimate:
  class: small_fpga
  confidence: medium
  rule_ref: area_estimate.rule.formulas.total_area_units
  assumptions:
    sm_count: 1
    warp_slots_per_sm: 4
    warp_size: 8
    registers_per_thread: 32
    integer_width_bits: 32
    shared_memory_bytes_per_sm: 0
    cache_size_bytes_per_sm: 1024
    issue_width: 1
    pipeline_stage_count: 5
  deterministic_terms:
    register_file_area_units: "1 * 4 * 8 * 32 * 32"
    shared_memory_area_units: "1 * 0"
    cache_area_units: "1 * 1024"
    pipeline_area_units: "1 * 1 * 5"
    total_area_units: "register_file_area_units + shared_memory_area_units + cache_area_units + pipeline_area_units"
memory_pressure_estimate:
  class: high_for_single_lsq
  cause: vector_add_global_load_store_mix
  rule_ref: memory_pressure_estimate.rule.formulas.unhidden_memory_pressure_score
  deterministic_terms:
    memory_ops_per_instruction: "load_fraction + store_fraction"
    effective_latency_hiding_warps: "max(1, warp_occupancy_bound.max_resident_warps)"
warp_occupancy_bound:
  max_resident_warps: 4
  limiting_resource: register_file_size
  rule_ref: warp_occupancy_bound.rule.formulas.max_resident_warps
register_pressure_bound:
  registers_per_thread: 8
shared_memory_pressure_bound:
  bytes_per_block: 0
minimum_bandwidth_need:
  bytes_per_cycle: 8
  rule_ref: minimum_bandwidth_need.rule.formulas.bytes_per_cycle
known_unrealizable_risks:
  - four_warps_can_saturate_single_entry_lsq
