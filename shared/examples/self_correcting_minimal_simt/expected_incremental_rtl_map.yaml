system_contract_ir_hash: hash_system_contract_minimal_simt
golden_contract_model_hash: hash_golden_contract_minimal_simt
modules:
  - module_id: warp_scheduler
    template_id: warp_scheduler_template
    module_kind: control
    consumed_contract_paths:
      - execution_model.scheduler
      - state_model.scheduler_state
    required_local_state: [scheduler_cursor, ready_warp_mask]
    input_interfaces: [scoreboard_to_warp_scheduler]
    output_interfaces: [warp_scheduler_to_decode_execute_pipeline]
    latency_contract:
      latency_min: 0
      latency_max: 1
    local_trace_schema: warp_scheduler_trace_v1
    local_simulation_evidence:
      verdict: PASS
      cases: [round_robin_fairness, skip_stalled_warp, no_ready_warp_idle]
      local_trace_hash: hash_warp_scheduler_partial_trace
    timing_feedback:
      local_timing_risk: low
      critical_signal_paths: [ready_warp_mask_to_selected_warp]
      estimated_register_count: 16
      estimated_sram_macro_need: none
      fanout_risk: low
      combinational_ready_loop_check:
        no_combinational_ready_loop: true
        checked_interfaces: [scoreboard_to_warp_scheduler, warp_scheduler_to_decode_execute_pipeline]
  - module_id: scoreboard
    template_id: scoreboard_template
    module_kind: hazard_tracker
    consumed_contract_paths:
      - execution_model.scoreboard
      - state_model.scoreboard_state
    required_local_state: [pending_register_bits]
    input_interfaces: [decode_execute_pipeline_to_scoreboard, memory_response_router_to_scoreboard]
    output_interfaces: [scoreboard_to_warp_scheduler]
    latency_contract:
      latency_min: 0
      latency_max: 1
    local_trace_schema: scoreboard_trace_v1
    local_simulation_evidence:
      verdict: PASS
      cases: [raw_dependency_stall, writeback_wakeup, multiple_warp_independence]
      local_trace_hash: hash_scoreboard_partial_trace
    timing_feedback:
      local_timing_risk: medium
      critical_signal_paths: [dependency_matrix_to_ready_warp_mask]
      estimated_register_count: 128
      estimated_sram_macro_need: none
      fanout_risk: medium
      combinational_ready_loop_check:
        no_combinational_ready_loop: true
        checked_interfaces: [scoreboard_to_warp_scheduler]
  - module_id: load_store_queue
    template_id: lsq_template
    module_kind: memory_pipeline
    consumed_contract_paths:
      - memory_model.request_lifecycle
      - memory_model.ordering
      - state_model.memory_stall_state
    required_local_state: [pending_memory_ops, request_tags, stall_state]
    input_interfaces: [decode_execute_pipeline_to_load_store_queue, memory_response_router_to_load_store_queue]
    output_interfaces: [load_store_queue_to_coalescer, load_store_queue_to_fault_completion_unit]
    latency_contract:
      latency_min: 1
      latency_max: 8
    local_trace_schema: lsq_trace_v1
    local_simulation_evidence:
      verdict: PASS_WITH_BACKPRESSURE
      cases: [ready_low_payload_stable, tag_unique, response_wakeup, fault_propagation]
      local_trace_hash: hash_lsq_partial_trace
    timing_feedback:
      local_timing_risk: medium
      critical_signal_paths: [ready_to_valid_backpressure, tag_compare_to_wakeup]
      estimated_register_count: 96
      estimated_sram_macro_need: none
      fanout_risk: medium
      combinational_ready_loop_check:
        no_combinational_ready_loop: true
        checked_interfaces: [load_store_queue_to_coalescer, memory_response_router_to_load_store_queue]
  - module_id: coalescer
    template_id: coalescer_template
    module_kind: memory_transform
    consumed_contract_paths:
      - memory_model.coalescing
      - memory_model.address_spaces
    required_local_state: [lane_request_buffer]
    input_interfaces: [load_store_queue_to_coalescer]
    output_interfaces: [coalescer_to_l1_cache_or_global_adapter]
    latency_contract:
      latency_min: 0
      latency_max: 2
    local_trace_schema: coalescer_trace_v1
    local_simulation_evidence:
      verdict: PASS
      cases: [lane_mask_byte_enable, contiguous_lane_coalescing, invalid_address_reject]
      local_trace_hash: hash_coalescer_partial_trace
    timing_feedback:
      local_timing_risk: medium
      critical_signal_paths: [lane_address_compare_to_transaction_pack]
      estimated_register_count: 64
      estimated_sram_macro_need: none
      fanout_risk: medium
      combinational_ready_loop_check:
        no_combinational_ready_loop: true
        checked_interfaces: [load_store_queue_to_coalescer, coalescer_to_l1_cache_or_global_adapter]
  - module_id: l1_cache_or_global_adapter
    template_id: l1_cache_or_global_adapter_template
    module_kind: memory_interface
    consumed_contract_paths:
      - memory_model.address_spaces
      - memory_model.request_lifecycle
      - memory_model.fault_behavior
    required_local_state: [request_buffer, response_buffer]
    input_interfaces: [coalescer_to_l1_cache_or_global_adapter]
    output_interfaces: [l1_cache_or_global_adapter_to_memory_response_router]
    latency_contract:
      latency_min: 1
      latency_max: 8
    local_trace_schema: l1_global_adapter_trace_v1
    local_simulation_evidence:
      verdict: PASS
      cases: [ready_low_payload_stable, global_response_match, fault_response]
      local_trace_hash: hash_l1_global_adapter_partial_trace
    timing_feedback:
      local_timing_risk: high
      critical_signal_paths: [global_ready_to_request_hold, response_tag_match]
      estimated_register_count: 80
      estimated_sram_macro_need: optional_direct_mapped_l1
      fanout_risk: medium
      combinational_ready_loop_check:
        no_combinational_ready_loop: true
        checked_interfaces: [coalescer_to_l1_cache_or_global_adapter, l1_cache_or_global_adapter_to_memory_response_router]
  - module_id: memory_response_router
    template_id: memory_response_router_template
    module_kind: memory_response
    consumed_contract_paths:
      - memory_model.request_lifecycle
      - interface_semantics_model.tag_uniqueness
      - interface_semantics_model.response_ordering
    required_local_state: [outstanding_tag_table]
    input_interfaces: [l1_cache_or_global_adapter_to_memory_response_router]
    output_interfaces: [memory_response_router_to_load_store_queue, memory_response_router_to_scoreboard, memory_response_router_to_fault_completion_unit]
    latency_contract:
      latency_min: 0
      latency_max: 2
    local_trace_schema: memory_response_router_trace_v1
    local_simulation_evidence:
      verdict: PASS
      cases: [tag_unique, response_wakeup, fault_propagation]
      local_trace_hash: hash_memory_response_router_partial_trace
    timing_feedback:
      local_timing_risk: medium
      critical_signal_paths: [response_tag_to_wakeup_route]
      estimated_register_count: 64
      estimated_sram_macro_need: none
      fanout_risk: medium
      combinational_ready_loop_check:
        no_combinational_ready_loop: true
        checked_interfaces: [l1_cache_or_global_adapter_to_memory_response_router, memory_response_router_to_load_store_queue]
  - module_id: fault_completion_unit
    template_id: fault_completion_unit_template
    module_kind: completion_fault
    consumed_contract_paths:
      - memory_model.fault_behavior
      - launch_model.completion_fault_observation
      - interface_semantics_model.fault_response
    required_local_state: [completion_status, fault_status]
    input_interfaces: [load_store_queue_to_fault_completion_unit, memory_response_router_to_fault_completion_unit]
    output_interfaces: [fault_completion_unit_to_csr_runtime_interface]
    latency_contract:
      latency_min: 0
      latency_max: 1
    local_trace_schema: fault_completion_trace_v1
    local_simulation_evidence:
      verdict: PASS
      cases: [fault_propagation, done_status, trap_or_poison_status]
      local_trace_hash: hash_fault_completion_partial_trace
    timing_feedback:
      local_timing_risk: low
      critical_signal_paths: [fault_code_to_csr_status]
      estimated_register_count: 32
      estimated_sram_macro_need: none
      fanout_risk: low
      combinational_ready_loop_check:
        no_combinational_ready_loop: true
        checked_interfaces: [fault_completion_unit_to_csr_runtime_interface]
  - module_id: csr_runtime_interface
    template_id: csr_runtime_template
    module_kind: runtime_interface
    consumed_contract_paths:
      - launch_model.abi
      - launch_model.kernel_entry
      - launch_model.completion_fault_observation
      - config_contract.hw_sw_abi
    required_local_state: [start_bit, done_bit, fault_bit, kernel_entry, arg_base]
    input_interfaces: [host_to_csr_runtime_interface, fault_completion_unit_to_csr_runtime_interface]
    output_interfaces: [csr_runtime_interface_to_sm_core]
    latency_contract:
      latency_min: 0
      latency_max: 1
    local_trace_schema: csr_runtime_trace_v1
    local_simulation_evidence:
      verdict: PASS
      cases: [start, done, fault, kernel_entry, arg_base]
      local_trace_hash: hash_csr_runtime_partial_trace
    timing_feedback:
      local_timing_risk: low
      critical_signal_paths: [csr_write_to_start_bit]
      estimated_register_count: 48
      estimated_sram_macro_need: none
      fanout_risk: low
      combinational_ready_loop_check:
        no_combinational_ready_loop: true
        checked_interfaces: [host_to_csr_runtime_interface, csr_runtime_interface_to_sm_core]
module_interfaces:
  - interface_id: load_store_queue_to_coalescer
    producer_module: load_store_queue
    consumer_module: coalescer
    protocol:
      type: REQ_RSP_TAGGED
    payload:
      fields:
        - name: request_tag
          width: 8
          signedness: unsigned
          semantic_path: interface_semantics_model.tag_uniqueness
        - name: address
          width: 32
          signedness: unsigned
          semantic_path: memory_model.address_spaces
        - name: lane_mask
          width: 8
          signedness: unsigned
          semantic_path: execution_model.simt.active_mask_rule
    handshake:
      accepted_when: valid_and_ready
      stall_rule: hold_payload_until_ready
      payload_stability_when_stalled: stable
    ordering:
      in_order: true
      tag_unique_until_response: true
    latency:
      min: 0
      max: 2
    reset:
      valid_reset: 0
      ready_reset: 0
    trace_tap:
      fire_event: lsq_to_coalescer_fire
      payload_fields: [request_tag, address, lane_mask]
    adapter:
      allowed: false
      adapter_module: none
  - interface_id: coalescer_to_l1_cache_or_global_adapter
    producer_module: coalescer
    consumer_module: l1_cache_or_global_adapter
    protocol:
      type: REQ_RSP_TAGGED
    payload:
      fields:
        - name: request_tag
          width: 8
          signedness: unsigned
          semantic_path: interface_semantics_model.tag_uniqueness
        - name: coalesced_address
          width: 32
          signedness: unsigned
          semantic_path: memory_model.coalescing
        - name: byte_enable
          width: 8
          signedness: unsigned
          semantic_path: memory_model.coalescing
    handshake:
      accepted_when: valid_and_ready
      stall_rule: hold_payload_until_ready
      payload_stability_when_stalled: stable
    ordering:
      in_order: true
      tag_unique_until_response: true
    latency:
      min: 1
      max: 8
    reset:
      valid_reset: 0
      ready_reset: 0
    trace_tap:
      fire_event: coalescer_to_global_fire
      payload_fields: [request_tag, coalesced_address, byte_enable]
    adapter:
      allowed: false
      adapter_module: none
  - interface_id: l1_cache_or_global_adapter_to_memory_response_router
    producer_module: l1_cache_or_global_adapter
    consumer_module: memory_response_router
    protocol:
      type: REQ_RSP_TAGGED
    payload:
      fields:
        - name: response_tag
          width: 8
          signedness: unsigned
          semantic_path: interface_semantics_model.response_ordering
        - name: response_data
          width: 32
          signedness: unsigned
          semantic_path: memory_model.request_lifecycle
        - name: fault
          width: 1
          signedness: unsigned
          semantic_path: memory_model.fault_behavior
    handshake:
      accepted_when: valid_and_ready
      stall_rule: hold_payload_until_ready
      payload_stability_when_stalled: stable
    ordering:
      in_order: true
      tag_unique_until_response: true
    latency:
      min: 0
      max: 2
    reset:
      valid_reset: 0
      ready_reset: 0
    trace_tap:
      fire_event: global_to_response_router_fire
      payload_fields: [response_tag, response_data, fault]
    adapter:
      allowed: false
      adapter_module: none
module_binding_templates:
  load_store_queue: lsq_template
  coalescer: coalescer_template
  l1_cache_or_global_adapter: l1_cache_or_global_adapter_template
  memory_response_router: memory_response_router_template
  fault_completion_unit: fault_completion_unit_template
  csr_runtime_interface: csr_runtime_template
consumed_contract_paths:
  load_store_queue:
    - memory_model.request_lifecycle
  coalescer:
    - memory_model.coalescing
  l1_cache_or_global_adapter:
    - memory_model.request_lifecycle
provided_signal_paths:
  load_store_queue:
    - rtl.load_store_queue.req_valid
    - rtl.load_store_queue.req_tag
  coalescer:
    - rtl.coalescer.coalesced_address
    - rtl.coalescer.byte_enable
local_trace_schemas:
  load_store_queue: lsq_trace_v1
  coalescer: coalescer_trace_v1
  l1_cache_or_global_adapter: l1_global_adapter_trace_v1
timing_feedback:
  load_store_queue:
    local_timing_risk: medium
    no_combinational_ready_loop: true
  coalescer:
    local_timing_risk: medium
    no_combinational_ready_loop: true
  l1_cache_or_global_adapter:
    local_timing_risk: high
    no_combinational_ready_loop: true
unresolved_binding_risks:
  - lsq_backpressure_can_reduce_warp_occupancy
  - l1_cache_or_global_adapter_timing_needs_later_synthesis_check
